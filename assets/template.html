<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[项目名称] 架构图</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: #f8fafc;
      min-height: 100vh;
      padding: 2rem;
      color: #0f172a;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 2rem;
    }

    .header-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.5rem;
    }

    .pulse-dot {
      width: 12px;
      height: 12px;
      background: #22d3ee;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0;
    }

    .subtitle {
      color: #475569;
      font-size: 0.875rem;
      margin-left: 1.75rem;
    }

    .diagram-container {
      background: #ffffff;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      padding: 1.5rem;
      overflow: hidden;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
      margin-top: 2rem;
    }

    .card {
      background: #ffffff;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      padding: 1.25rem;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .card-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .card-dot.cyan { background: #22d3ee; }
    .card-dot.emerald { background: #34d399; }
    .card-dot.violet { background: #a78bfa; }
    .card-dot.amber { background: #fbbf24; }
    .card-dot.rose { background: #fb7185; }

    .card h3 {
      font-size: 0.875rem;
      font-weight: 600;
      color: #0f172a;
    }

    .card ul {
      list-style: none;
      color: #475569;
      font-size: 0.75rem;
    }

    .card li {
      margin-bottom: 0.375rem;
    }

    .footer {
      text-align: center;
      margin-top: 1.5rem;
      color: #64748b;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-row">
        <div class="pulse-dot"></div>
        <h1>[项目名称] 架构图</h1>
      </div>
      <p class="subtitle">[用一句中文说明系统结构与主要数据流]</p>
    </div>

    <div class="diagram-container">
      <svg viewBox="0 0 1000 720" role="img" aria-label="[项目名称] 架构图">
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#475569" />
          </marker>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#cbd5e1" stroke-width="0.5"/>
          </pattern>
        </defs>

        <rect width="100%" height="100%" fill="url(#grid)" />

        <!-- 先画箭头，保持在节点下层；默认使用端口锚点与正交走线 -->
        <path d="M 130 330 H 220" fill="none" stroke="#0891b2" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <path d="M 400 330 H 490" fill="none" stroke="#059669" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <path d="M 660 330 H 730" fill="none" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <path d="M 555 370 V 390" fill="none" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <path d="M 85 150 V 220 H 270 V 245" fill="none" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>

        <!-- 边界 -->
        <rect x="170" y="40" width="790" height="560" rx="12" fill="rgba(251, 191, 36, 0.06)" stroke="#d97706" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="184" y="58" fill="#b45309" font-size="10" font-weight="600">部署区域 / 逻辑边界</text>

        <!-- 外部用户 -->
        <rect x="40" y="255" width="90" height="60" rx="6" fill="#ffffff"/>
        <rect x="40" y="255" width="90" height="60" rx="6" fill="rgba(148, 163, 184, 0.16)" stroke="#64748b" stroke-width="1.5"/>
        <text x="85" y="279" fill="#0f172a" font-size="11" font-weight="600" text-anchor="middle">用户</text>
        <text x="85" y="296" fill="#475569" font-size="9" text-anchor="middle">浏览器 / App</text>

        <!-- 认证 -->
        <rect x="30" y="90" width="110" height="60" rx="6" fill="#ffffff"/>
        <rect x="30" y="90" width="110" height="60" rx="6" fill="rgba(251, 113, 133, 0.12)" stroke="#e11d48" stroke-width="1.5"/>
        <text x="85" y="115" fill="#0f172a" font-size="11" font-weight="600" text-anchor="middle">认证服务</text>
        <text x="85" y="132" fill="#475569" font-size="9" text-anchor="middle">OAuth / SSO</text>

        <!-- 前端 -->
        <rect x="220" y="245" width="170" height="80" rx="8" fill="#ffffff"/>
        <rect x="220" y="245" width="170" height="80" rx="8" fill="rgba(34, 211, 238, 0.12)" stroke="#0891b2" stroke-width="1.5"/>
        <text x="305" y="270" fill="#0f172a" font-size="12" font-weight="600" text-anchor="middle">前端应用</text>
        <text x="305" y="288" fill="#475569" font-size="9" text-anchor="middle">Vue / React / Web Client</text>
        <text x="305" y="306" fill="#475569" font-size="8" text-anchor="middle">路由、状态、交互层</text>

        <!-- 服务层 -->
        <rect x="470" y="245" width="170" height="80" rx="8" fill="#ffffff"/>
        <rect x="470" y="245" width="170" height="80" rx="8" fill="rgba(52, 211, 153, 0.12)" stroke="#059669" stroke-width="1.5"/>
        <text x="555" y="270" fill="#0f172a" font-size="12" font-weight="600" text-anchor="middle">服务层</text>
        <text x="555" y="288" fill="#475569" font-size="9" text-anchor="middle">API / BFF / Service</text>
        <text x="555" y="306" fill="#475569" font-size="8" text-anchor="middle">鉴权、聚合、业务逻辑</text>

        <!-- 数据层 -->
        <rect x="730" y="245" width="170" height="80" rx="8" fill="#ffffff"/>
        <rect x="730" y="245" width="170" height="80" rx="8" fill="rgba(167, 139, 250, 0.12)" stroke="#7c3aed" stroke-width="1.5"/>
        <text x="815" y="270" fill="#0f172a" font-size="12" font-weight="600" text-anchor="middle">数据层</text>
        <text x="815" y="288" fill="#475569" font-size="9" text-anchor="middle">MySQL / Redis / ES</text>
        <text x="815" y="306" fill="#475569" font-size="8" text-anchor="middle">持久化与检索</text>

        <!-- 异步层 -->
        <rect x="470" y="390" width="180" height="80" rx="8" fill="#ffffff"/>
        <rect x="470" y="390" width="180" height="80" rx="8" fill="rgba(251, 191, 36, 0.18)" stroke="#d97706" stroke-width="1.5"/>
        <text x="560" y="415" fill="#0f172a" font-size="12" font-weight="600" text-anchor="middle">异步处理</text>
        <text x="560" y="433" fill="#475569" font-size="9" text-anchor="middle">Queue / Worker / Cron</text>
        <text x="560" y="451" fill="#475569" font-size="8" text-anchor="middle">削峰、重试、后台任务</text>

        <!-- 标签：放进独立 lane，并加不透明底 -->
        <rect x="154" y="306" width="42" height="16" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="0.8"/>
        <text x="175" y="317" fill="#475569" font-size="9" text-anchor="middle">HTTPS</text>

        <rect x="414" y="306" width="32" height="16" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="0.8"/>
        <text x="430" y="317" fill="#475569" font-size="9" text-anchor="middle">API</text>

        <rect x="669" y="306" width="32" height="16" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="0.8"/>
        <text x="685" y="317" fill="#475569" font-size="9" text-anchor="middle">query</text>

        <rect x="567" y="348" width="36" height="16" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="0.8"/>
        <text x="585" y="359" fill="#475569" font-size="9" text-anchor="middle">event</text>

        <rect x="165" y="202" width="56" height="16" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="0.8"/>
        <text x="193" y="213" fill="#be123c" font-size="8" text-anchor="middle">认证回调</text>

        <!-- 图例 -->
        <text x="70" y="645" fill="#0f172a" font-size="10" font-weight="600">图例</text>

        <rect x="70" y="658" width="16" height="10" rx="2" fill="rgba(34, 211, 238, 0.12)" stroke="#0891b2" stroke-width="1"/>
        <text x="92" y="666" fill="#475569" font-size="8">前端 / 入口</text>

        <rect x="190" y="658" width="16" height="10" rx="2" fill="rgba(52, 211, 153, 0.12)" stroke="#059669" stroke-width="1"/>
        <text x="212" y="666" fill="#475569" font-size="8">服务 / 运行时</text>

        <rect x="330" y="658" width="16" height="10" rx="2" fill="rgba(167, 139, 250, 0.12)" stroke="#7c3aed" stroke-width="1"/>
        <text x="352" y="666" fill="#475569" font-size="8">数据 / 存储</text>

        <rect x="470" y="658" width="16" height="10" rx="2" fill="rgba(251, 191, 36, 0.18)" stroke="#d97706" stroke-width="1"/>
        <text x="492" y="666" fill="#475569" font-size="8">异步 / 基础设施</text>
      </svg>
    </div>

    <div class="cards">
      <div class="card">
        <div class="card-header">
          <div class="card-dot cyan"></div>
          <h3>走线规则</h3>
        </div>
        <ul>
          <li>边默认挂到节点中点端口，优先使用正交走线。</li>
          <li>标签放在独立 lane，上方加不透明底片。</li>
        </ul>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-dot emerald"></div>
          <h3>节点表达</h3>
        </div>
        <ul>
          <li>节点写清角色、职责、关键技术词。</li>
          <li>技术名词可以保留英文，说明文字默认中文。</li>
        </ul>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-dot violet"></div>
          <h3>导出要求</h3>
        </div>
        <ul>
          <li>核心图形必须完整落在 SVG viewBox 内。</li>
          <li>生成图片时优先使用同名 `.svg` 作为导出源。</li>
        </ul>
      </div>
    </div>

    <p class="footer">[项目名称] • 默认中文输出 • 适合直接打开与分享</p>
  </div>
</body>
</html>
