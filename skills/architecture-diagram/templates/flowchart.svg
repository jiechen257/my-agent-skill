<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 980" width="900" height="980">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#5a5a5a"/>
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .title { font-size: 28px; font-weight: 700; fill: #1a1a1a; }
    .subtitle { font-size: 14px; fill: #6a6a6a; }
    .terminal { fill: #a8c5e6; stroke: #4a4a4a; stroke-width: 2; }
    .process { fill: #9dd4c7; stroke: #4a4a4a; stroke-width: 2; }
    .io { fill: #f4e4c1; stroke: #4a4a4a; stroke-width: 2; }
    .decision { fill: #e8e6e3; stroke: #4a4a4a; stroke-width: 2; }
    .edge { fill: none; stroke: #5a5a5a; stroke-width: 2; marker-end: url(#arrow); }
    .chip { fill: #fffdf8; stroke: #d9d3ca; stroke-width: 0.8; }
    .label { font-size: 9px; fill: #5a5a5a; }
    .node-title { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
    .node-sub { font-size: 9px; fill: #5a5a5a; }
  </style>
  <rect width="900" height="980" fill="#f8f6f3"/>
  <rect x="24" y="24" width="852" height="932" rx="18" fill="#fffdf8" stroke="#d9d3ca" stroke-width="1.4"/>
  <text x="60" y="58" class="title">[流程名称] 流程图</text>
  <text x="60" y="80" class="subtitle">[在这里填写流程目标、决策条件和结束结果]</text>
  <path d="M 450 170 V 250" class="edge"/>
  <path d="M 450 330 V 410" class="edge"/>
  <path d="M 450 508 V 600" class="edge"/>
  <path d="M 380 508 H 250 V 702 H 450 V 760" class="edge"/>
  <path d="M 520 508 H 650 V 760 H 450 V 760" class="edge"/>
  <rect x="355" y="110" width="190" height="60" rx="20" class="terminal"/>
  <text x="450" y="136" class="node-title" text-anchor="middle">开始</text>
  <text x="450" y="154" class="node-sub" text-anchor="middle">触发条件 / 入口事件</text>
  <rect x="330" y="250" width="240" height="80" rx="12" class="process"/>
  <text x="450" y="278" class="node-title" text-anchor="middle">主处理步骤</text>
  <text x="450" y="297" class="node-sub" text-anchor="middle">读取上下文 / 执行核心逻辑</text>
  <path d="M 450 410 L 560 480 L 450 550 L 340 480 Z" class="decision"/>
  <text x="450" y="475" class="node-title" text-anchor="middle">条件满足？</text>
  <rect x="330" y="760" width="240" height="80" rx="12" class="io"/>
  <text x="450" y="788" class="node-title" text-anchor="middle">输出结果</text>
  <text x="450" y="807" class="node-sub" text-anchor="middle">返回响应 / 写入产物</text>
  <rect x="355" y="840" width="190" height="60" rx="20" class="terminal"/>
  <text x="450" y="866" class="node-title" text-anchor="middle">结束</text>
  <text x="450" y="884" class="node-sub" text-anchor="middle">流程完成</text>
  <path d="M 450 840 V 900" class="edge"/>
  <rect x="542" y="458" width="28" height="16" rx="5" class="chip"/>
  <text x="556" y="469" class="label" text-anchor="middle">是</text>
  <rect x="330" y="458" width="28" height="16" rx="5" class="chip"/>
  <text x="344" y="469" class="label" text-anchor="middle">否</text>
</svg>
