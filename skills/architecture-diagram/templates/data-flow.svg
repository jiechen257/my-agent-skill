<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" width="1080" height="720" role="img" aria-labelledby="diagram-title diagram-desc">
  <title id="diagram-title">[数据主题] 数据流图</title>
  <desc id="diagram-desc">左到右 starter：保留主数据流、回流支路和 payload 标签 lane，便于扩展真实数据链路。</desc>
  <defs>
    <marker id="arrow" markerWidth="4.8" markerHeight="4.8" refX="4.2" refY="2.4" orient="auto">
      <polygon points="0 0, 4.8 2.4, 0 4.8" fill="#5a5a5a"/>
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .title { font-size: 28px; font-weight: 700; fill: #1a1a1a; }
    .subtitle { font-size: 14px; fill: #6a6a6a; }
    .lane { fill: rgba(248, 246, 243, 0.68); stroke: #d9d3ca; stroke-width: 1.1; }
    .source { fill: #a8c5e6; stroke: #4a4a4a; stroke-width: 2; }
    .transform { fill: #9dd4c7; stroke: #4a4a4a; stroke-width: 2; }
    .store { fill: #e8e6e3; stroke: #4a4a4a; stroke-width: 2; }
    .sink { fill: #f4e4c1; stroke: #4a4a4a; stroke-width: 2; }
    .edge { fill: none; stroke: #5a5a5a; stroke-width: 2; marker-end: url(#arrow); }
    .feedback { stroke-dasharray: 7,5; }
    .chip { fill: #fffdf8; stroke: #d9d3ca; stroke-width: 0.8; }
    .label { font-size: 9px; fill: #5a5a5a; }
    .node-title { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
    .node-sub { font-size: 9px; fill: #5a5a5a; }
  </style>

  <rect width="1080" height="720" fill="#f8f6f3"/>
  <rect x="24" y="24" width="1032" height="672" rx="18" fill="#fffdf8" stroke="#d9d3ca" stroke-width="1.4"/>
  <text x="60" y="64" class="title">[数据主题] 数据流图</text>
  <text x="60" y="88" class="subtitle">[在这里填写数据来源、变换步骤、落库位置和回流结果]</text>

  <rect x="72" y="248" width="936" height="162" rx="18" class="lane"/>
  <rect x="72" y="470" width="936" height="124" rx="18" class="lane"/>

  <rect x="90" y="286" width="140" height="84" rx="12" class="source"/>
  <rect x="360" y="274" width="220" height="108" rx="12" class="transform"/>
  <rect x="690" y="274" width="220" height="108" rx="12" class="store"/>
  <rect x="950" y="286" width="80" height="84" rx="12" class="sink"/>
  <rect x="350" y="506" width="220" height="72" rx="12" class="sink"/>

  <text x="160" y="320" class="node-title" text-anchor="middle">数据源</text>
  <text x="160" y="339" class="node-sub" text-anchor="middle">事件 / 文件 / 请求</text>
  <text x="470" y="318" class="node-title" text-anchor="middle">变换逻辑</text>
  <text x="470" y="337" class="node-sub" text-anchor="middle">清洗 / 富化 / 规范化</text>
  <text x="800" y="318" class="node-title" text-anchor="middle">存储层</text>
  <text x="800" y="337" class="node-sub" text-anchor="middle">DB / Cache / Index</text>
  <text x="990" y="320" class="node-title" text-anchor="middle">消费端</text>
  <text x="990" y="339" class="node-sub" text-anchor="middle">API</text>
  <text x="460" y="536" class="node-title" text-anchor="middle">回流结果</text>
  <text x="460" y="555" class="node-sub" text-anchor="middle">报告 / 通知 / 响应</text>

  <path d="M 230 328 H 360" class="edge" id="edge-source-transform"/>
  <path d="M 580 328 H 690" class="edge" id="edge-transform-store"/>
  <path d="M 910 328 H 950" class="edge" id="edge-store-sink"/>
  <path d="M 800 382 V 458 H 460 V 506" class="edge feedback" id="edge-store-feedback"/>

  <rect x="256" y="312" width="72" height="16" rx="5" class="chip" data-edge-id="edge-source-transform"/>
  <text x="292" y="323" class="label" text-anchor="middle" data-edge-id="edge-source-transform">原始事件</text>

  <rect x="600" y="312" width="58" height="16" rx="5" class="chip" data-edge-id="edge-transform-store"/>
  <text x="629" y="323" class="label" text-anchor="middle" data-edge-id="edge-transform-store">结构化数据</text>

  <rect x="918" y="302" width="24" height="16" rx="5" class="chip" data-edge-id="edge-store-sink"/>
  <text x="930" y="313" class="label" text-anchor="middle" data-edge-id="edge-store-sink">读</text>

  <rect x="810" y="416" width="50" height="16" rx="5" class="chip" data-edge-id="edge-store-feedback"/>
  <text x="835" y="427" class="label" text-anchor="middle" data-edge-id="edge-store-feedback">回流结果</text>
</svg>
