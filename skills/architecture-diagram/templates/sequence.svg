<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 760" width="1000" height="760">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#5a5a5a"/>
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .title { font-size: 28px; font-weight: 700; fill: #1a1a1a; }
    .subtitle { font-size: 14px; fill: #6a6a6a; }
    .participant { fill: #a8c5e6; stroke: #4a4a4a; stroke-width: 2; }
    .service { fill: #9dd4c7; stroke: #4a4a4a; stroke-width: 2; }
    .store { fill: #e8e6e3; stroke: #4a4a4a; stroke-width: 2; }
    .lifeline { stroke: #8f8a83; stroke-width: 1.2; stroke-dasharray: 6,5; }
    .activation { fill: #f4e4c1; stroke: #4a4a4a; stroke-width: 1.2; }
    .msg { stroke: #5a5a5a; stroke-width: 2; marker-end: url(#arrow); }
    .chip { fill: #fffdf8; stroke: #d9d3ca; stroke-width: 0.8; }
    .label { font-size: 9px; fill: #5a5a5a; }
    .node-title { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
  </style>
  <rect width="1000" height="760" fill="#f8f6f3"/>
  <rect x="24" y="24" width="952" height="712" rx="18" fill="#fffdf8" stroke="#d9d3ca" stroke-width="1.4"/>
  <text x="60" y="58" class="title">[交互主题] 时序图</text>
  <text x="60" y="80" class="subtitle">[在这里填写参与者、消息顺序和处理窗口]</text>
  <rect x="100" y="120" width="140" height="48" rx="12" class="participant"/>
  <rect x="430" y="120" width="140" height="48" rx="12" class="service"/>
  <rect x="760" y="120" width="140" height="48" rx="12" class="store"/>
  <text x="170" y="149" class="node-title" text-anchor="middle">调用方</text>
  <text x="500" y="149" class="node-title" text-anchor="middle">服务</text>
  <text x="830" y="149" class="node-title" text-anchor="middle">存储</text>
  <line x1="170" y1="168" x2="170" y2="660" class="lifeline"/>
  <line x1="500" y1="168" x2="500" y2="660" class="lifeline"/>
  <line x1="830" y1="168" x2="830" y2="660" class="lifeline"/>
  <rect x="492" y="220" width="16" height="160" class="activation"/>
  <rect x="822" y="320" width="16" height="120" class="activation"/>
  <line x1="170" y1="240" x2="500" y2="240" class="msg"/>
  <line x1="500" y1="340" x2="830" y2="340" class="msg"/>
  <line x1="830" y1="460" x2="500" y2="460" class="msg"/>
  <line x1="500" y1="560" x2="170" y2="560" class="msg"/>
  <rect x="300" y="224" width="50" height="16" rx="5" class="chip"/>
  <text x="325" y="235" class="label" text-anchor="middle">发起请求</text>
  <rect x="632" y="324" width="48" height="16" rx="5" class="chip"/>
  <text x="656" y="335" class="label" text-anchor="middle">读取状态</text>
  <rect x="632" y="444" width="48" height="16" rx="5" class="chip"/>
  <text x="656" y="455" class="label" text-anchor="middle">返回结果</text>
  <rect x="298" y="544" width="54" height="16" rx="5" class="chip"/>
  <text x="325" y="555" class="label" text-anchor="middle">响应调用方</text>
</svg>
