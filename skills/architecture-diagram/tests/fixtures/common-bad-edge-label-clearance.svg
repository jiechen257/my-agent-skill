<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" width="640" height="320">
  <defs>
    <marker id="arrow" markerWidth="4.8" markerHeight="4.8" refX="4.2" refY="2.4" orient="auto">
      <polygon points="0 0, 4.8 2.4, 0 4.8" fill="#5a5a5a"/>
    </marker>
  </defs>
  <style>
    .process { fill: #9dd4c7; stroke: #4a4a4a; stroke-width: 2; }
    .edge { fill: none; stroke: #5a5a5a; stroke-width: 2; marker-end: url(#arrow); }
    .chip { fill: #fffdf8; stroke: #d9d3ca; stroke-width: 0.8; }
    .label { font-size: 9px; fill: #5a5a5a; }
    .node-title { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
  </style>
  <rect width="640" height="320" fill="#f8f6f3"/>
  <rect x="24" y="24" width="592" height="272" rx="18" fill="#fffdf8" stroke="#d9d3ca" stroke-width="1.4"/>
  <path d="M 160 140 H 480" class="edge" id="edge-main"/>
  <path d="M 320 70 V 180" class="edge" id="edge-side"/>
  <rect x="60" y="110" width="100" height="60" rx="12" class="process"/>
  <rect x="480" y="110" width="100" height="60" rx="12" class="process"/>
  <text x="110" y="144" class="node-title" text-anchor="middle">入口</text>
  <text x="530" y="144" class="node-title" text-anchor="middle">出口</text>
  <rect x="286" y="132" width="68" height="16" rx="5" class="chip" data-edge-id="edge-side"/>
  <text x="320" y="143" class="label" text-anchor="middle" data-edge-id="edge-side">旁路线标签</text>
</svg>
