<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <marker id="arrow" markerWidth="4.8" markerHeight="4.8" refX="4.2" refY="2.4" orient="auto">
      <polygon points="0 0, 4.8 2.4, 0 4.8" fill="#5a5a5a"/>
    </marker>
  </defs>
  <style>
    .process { fill: #9dd4c7; stroke: #4a4a4a; stroke-width: 2; }
    .edge { fill: none; stroke: #5a5a5a; stroke-width: 2; marker-end: url(#arrow); }
    .chip { fill: #fffdf8; stroke: #d9d3ca; stroke-width: 0.8; }
    .label { font-size: 9px; fill: #5a5a5a; }
    .node-title { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
  </style>
  <rect width="640" height="360" fill="#f8f6f3"/>
  <rect x="24" y="24" width="592" height="312" rx="18" fill="#fffdf8" stroke="#d9d3ca" stroke-width="1.4"/>
  <path d="M 160 120 H 300" class="edge" id="edge-main"/>
  <path d="M 420 150 V 240 H 480" class="edge" id="edge-detour"/>
  <rect x="60" y="90" width="100" height="60" rx="12" class="process"/>
  <rect x="300" y="90" width="120" height="60" rx="12" class="process"/>
  <rect x="480" y="210" width="100" height="60" rx="12" class="process"/>
  <text x="110" y="124" class="node-title" text-anchor="middle">入口</text>
  <text x="360" y="124" class="node-title" text-anchor="middle">处理</text>
  <text x="530" y="244" class="node-title" text-anchor="middle">输出</text>
  <rect x="206" y="96" width="48" height="16" rx="5" class="chip" data-edge-id="edge-main"/>
  <text x="230" y="107" class="label" text-anchor="middle" data-edge-id="edge-main">主线</text>
  <rect x="430" y="184" width="40" height="16" rx="5" class="chip" data-edge-id="edge-detour"/>
  <text x="450" y="195" class="label" text-anchor="middle" data-edge-id="edge-detour">回流</text>
</svg>
