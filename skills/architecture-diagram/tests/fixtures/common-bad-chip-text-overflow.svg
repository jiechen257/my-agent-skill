<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" width="720" height="420">
  <defs>
    <marker id="arrow" markerWidth="4.8" markerHeight="4.8" refX="4.2" refY="2.4" orient="auto">
      <polygon points="0 0, 4.8 2.4, 0 4.8" fill="#5a5a5a"/>
    </marker>
  </defs>
  <style>
    .chip { fill: #fffdf8; stroke: #d9d3ca; stroke-width: 0.8; }
    .label { font-size: 10px; fill: #5a5a5a; }
    .edge { fill: none; stroke: #5a5a5a; stroke-width: 2; marker-end: url(#arrow); }
  </style>
  <rect width="720" height="420" fill="#f8f6f3"/>
  <rect x="24" y="24" width="672" height="372" rx="18" fill="#fffdf8" stroke="#d9d3ca" stroke-width="1.4"/>
  <path d="M 120 220 H 420" class="edge" id="edge-main"/>
  <rect x="220" y="204" width="56" height="16" rx="5" class="chip" data-edge-id="edge-main"/>
  <text x="248" y="215" class="label" text-anchor="middle" data-edge-id="edge-main">这个标签明显比 chip 更长</text>
</svg>
