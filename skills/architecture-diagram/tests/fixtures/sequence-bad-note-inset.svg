<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" width="720" height="520">
  <defs>
    <marker id="arrow" markerWidth="4.8" markerHeight="4.8" refX="4.2" refY="2.4" orient="auto">
      <polygon points="0 0, 4.8 2.4, 0 4.8" fill="#5a5a5a"/>
    </marker>
  </defs>
  <style>
    .participant { fill: #a8c5e6; stroke: #4a4a4a; stroke-width: 2; }
    .service { fill: #9dd4c7; stroke: #4a4a4a; stroke-width: 2; }
    .lifeline { stroke: #8f8a83; stroke-width: 1.2; stroke-dasharray: 6,5; }
    .msg { stroke: #5a5a5a; stroke-width: 1.9; marker-end: url(#arrow); }
    .note-card { fill: #dff3ef; stroke: #a8cfc6; stroke-width: 1.2; }
    .legend { font-size: 11px; fill: #6a6a6a; }
  </style>
  <rect width="720" height="520" fill="#f8f6f3"/>
  <rect x="24" y="24" width="672" height="472" rx="18" fill="#fffdf8" stroke="#d9d3ca" stroke-width="1.4"/>
  <rect x="432" y="72" width="236" height="88" rx="14" class="note-card"/>
  <text x="442" y="98" font-size="12">关键约束</text>
  <text x="442" y="118" font-size="10">这张 note card 右侧 inset 不足。</text>
  <rect x="74" y="214" width="104" height="44" rx="12" class="participant"/>
  <rect x="542" y="214" width="104" height="44" rx="12" class="service"/>
  <line x1="126" y1="258" x2="126" y2="412" class="lifeline"/>
  <line x1="594" y1="258" x2="594" y2="412" class="lifeline"/>
  <line x1="126" y1="300" x2="594" y2="300" class="msg"/>
  <text x="60" y="436" class="legend">图例：note card 需要保持右侧安全边距。</text>
</svg>
