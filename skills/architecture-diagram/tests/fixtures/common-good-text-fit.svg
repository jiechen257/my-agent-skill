<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" width="720" height="560">
  <defs>
    <marker id="arrow" markerWidth="4.8" markerHeight="4.8" refX="4.2" refY="2.4" orient="auto">
      <polygon points="0 0, 4.8 2.4, 0 4.8" fill="#5a5a5a"/>
    </marker>
  </defs>
  <style>
    .note-card { fill: #dff3ef; stroke: #a8cfc6; stroke-width: 1.2; }
    .note-title { font-size: 13px; font-weight: 700; fill: #24443d; }
    .note-text { font-size: 11px; fill: #355650; }
    .phase-band { fill: #e9f2fb; }
    .phase-pill { fill: #fffdf8; stroke: #d9d3ca; stroke-width: 1.1; }
    .phase-text { font-size: 12px; font-weight: 700; fill: #4c4c4c; }
    .chip { fill: #fffdf8; stroke: #d9d3ca; stroke-width: 0.8; }
    .label { font-size: 10px; fill: #5a5a5a; }
    .edge { fill: none; stroke: #5a5a5a; stroke-width: 2; marker-end: url(#arrow); }
    .legend { font-size: 11px; fill: #6a6a6a; }
  </style>
  <rect width="720" height="560" fill="#f8f6f3"/>
  <rect x="24" y="24" width="672" height="512" rx="18" fill="#fffdf8" stroke="#d9d3ca" stroke-width="1.4"/>
  <rect x="60" y="72" width="300" height="92" rx="14" class="note-card"/>
  <text x="84" y="98" class="note-title">关键约束</text>
  <text x="84" y="120" class="note-text">
    <tspan x="84" dy="0">1. 说明文字主动换行。</tspan>
    <tspan x="84" dy="16">2. 标签与阶段标题都留出内边距。</tspan>
  </text>
  <rect x="60" y="220" width="600" height="30" rx="14" class="phase-band"/>
  <rect x="84" y="225" width="180" height="20" rx="10" class="phase-pill"/>
  <text x="174" y="239" class="phase-text" text-anchor="middle">阶段一：文本适配通过</text>
  <path d="M 120 320 H 400" class="edge" id="edge-main"/>
  <rect x="214" y="304" width="92" height="16" rx="5" class="chip" data-edge-id="edge-main"/>
  <text x="260" y="315" class="label" text-anchor="middle" data-edge-id="edge-main">标签宽度合适</text>
  <text x="60" y="468" class="legend">图例：这一行文字保留了底部安全边距，也没有超出内容框宽度。</text>
</svg>
