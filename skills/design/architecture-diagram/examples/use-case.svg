<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" width="1000" height="720">
  <defs>
    <marker id="arrow" markerWidth="4.8" markerHeight="4.8" refX="4.2" refY="2.4" orient="auto">
      <polygon points="0 0, 4.8 2.4, 0 4.8" fill="#5a5a5a"/>
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .title { font-size: 28px; font-weight: 700; fill: #1a1a1a; }
    .subtitle { font-size: 14px; fill: #6a6a6a; }
    .boundary { fill: rgba(244, 228, 193, 0.24); stroke: #8f7350; stroke-width: 1.6; stroke-dasharray: 8,4; }
    .usecase { fill: #9dd4c7; stroke: #4a4a4a; stroke-width: 1.8; }
    .actor { stroke: #4a4a4a; stroke-width: 2; fill: none; }
    .edge { fill: none; stroke: #5a5a5a; stroke-width: 1.8; marker-end: url(#arrow); }
    .relation { stroke-dasharray: 7,5; }
    .label { font-size: 10px; fill: #5a5a5a; }
    .node-title { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
  </style>
  <rect width="1000" height="720" fill="#f8f6f3"/>
  <rect x="24" y="24" width="952" height="672" rx="18" fill="#fffdf8" stroke="#d9d3ca" stroke-width="1.4"/>
  <text x="60" y="58" class="title">[系统名称] 用例图</text>
  <text x="60" y="80" class="subtitle">[在这里填写角色、系统边界与核心用例]</text>
  <rect x="250" y="140" width="520" height="420" rx="18" class="boundary"/>
  <text x="280" y="168" class="node-title">系统边界</text>
  <line x1="130" y1="230" x2="130" y2="290" class="actor"/>
  <line x1="100" y1="250" x2="160" y2="250" class="actor"/>
  <line x1="130" y1="290" x2="100" y2="340" class="actor"/>
  <line x1="130" y1="290" x2="160" y2="340" class="actor"/>
  <circle cx="130" cy="210" r="20" class="actor"/>
  <text x="130" y="365" class="label" text-anchor="middle">用户角色</text>
  <ellipse cx="450" cy="240" rx="110" ry="36" class="usecase"/>
  <ellipse cx="580" cy="360" rx="120" ry="36" class="usecase"/>
  <ellipse cx="430" cy="470" rx="120" ry="36" class="usecase"/>
  <text x="450" y="245" class="node-title" text-anchor="middle">创建业务请求</text>
  <text x="580" y="365" class="node-title" text-anchor="middle">查看处理结果</text>
  <text x="430" y="475" class="node-title" text-anchor="middle">补充上下文信息</text>
  <line x1="150" y1="230" x2="340" y2="240" class="actor"/>
  <line x1="150" y1="250" x2="460" y2="470" class="actor"/>
  <path d="M 554 252 H 580 V 324" class="edge relation" id="edge-include"/>
  <path d="M 550 470 H 580 V 396" class="edge relation" id="edge-extend"/>
  <text x="555" y="282" class="label" text-anchor="middle" data-edge-id="edge-include">&lt;&lt;include&gt;&gt;</text>
  <text x="610" y="450" class="label" text-anchor="middle" data-edge-id="edge-extend">&lt;&lt;extend&gt;&gt;</text>
</svg>
