<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" width="1000" height="720" role="img" aria-labelledby="diagram-title diagram-desc">
  <title id="diagram-title">[项目名称] 技术图</title>
  <desc id="diagram-desc">轻量 starter，用于承载通用技术图骨架、标题区、摘要 note 和可扩展主画布。</desc>
  <defs>
    <marker id="arrow-claude" markerWidth="4.8" markerHeight="4.8" refX="4.2" refY="2.4" orient="auto">
      <polygon points="0 0, 4.8 2.4, 0 4.8" fill="#5a5a5a"/>
    </marker>
  </defs>
  <style>
    text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .title { font-size: 28px; font-weight: 700; fill: #1a1a1a; }
    .subtitle { font-size: 14px; fill: #6a6a6a; }
    .guide { fill: rgba(248, 246, 243, 0.55); stroke: #d9d3ca; stroke-width: 1.1; stroke-dasharray: 8,6; }
    .note-card { fill: #dff3ef; stroke: #a8cfc6; stroke-width: 1.1; }
    .note-title { font-size: 12px; font-weight: 700; fill: #24443d; }
    .note-text { font-size: 10px; fill: #355650; }
    .node-title { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
    .node-sub { font-size: 10px; fill: #5a5a5a; }
    .edge { fill: none; stroke: #5a5a5a; stroke-width: 2; marker-end: url(#arrow-claude); }
    .edge-label-bg { fill: #fffdf8; stroke: #d9d3ca; stroke-width: 0.9; }
    .edge-label { font-size: 9px; fill: #5a5a5a; }
  </style>

  <rect width="1000" height="720" fill="#f8f6f3"/>
  <rect x="24" y="24" width="952" height="672" rx="18" fill="#fffdf8" stroke="#d9d3ca" stroke-width="1.4"/>
  <text x="60" y="64" class="title">[项目名称] 技术图</text>
  <text x="60" y="88" class="subtitle">[在这里填写图的目标、边界和核心阅读顺序]</text>

  <rect x="684" y="52" width="252" height="58" rx="12" class="note-card"/>
  <text x="730" y="76" class="note-title">摘要</text>
  <text x="730" y="96" class="note-text">[在这里放一行关键说明]</text>

  <rect x="60" y="126" width="880" height="510" rx="18" class="guide"/>
  <rect x="146" y="314" width="180" height="72" rx="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2"/>
  <rect x="534" y="314" width="220" height="72" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2"/>
  <text x="236" y="346" class="node-title" text-anchor="middle">入口块</text>
  <text x="236" y="366" class="node-sub" text-anchor="middle">[保留给节点或阶段]</text>
  <text x="644" y="346" class="node-title" text-anchor="middle">主内容块</text>
  <text x="644" y="366" class="node-sub" text-anchor="middle">[从这里开始扩展图结构]</text>

  <path d="M 326 350 H 534" class="edge" id="edge-main"/>
  <rect x="400" y="334" width="54" height="16" rx="5" class="edge-label-bg" data-edge-id="edge-main"/>
  <text x="427" y="345" class="edge-label" text-anchor="middle" data-edge-id="edge-main">主关系</text>
</svg>
