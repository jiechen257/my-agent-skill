<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" width="1000" height="720" role="img" aria-labelledby="diagram-title diagram-desc">
  <title id="diagram-title">[项目名称] 技术图</title>
  <desc id="diagram-desc">default 风格的轻量 starter，用于搭建简洁技术图的标题区、主画布和最小关系示例。</desc>
  <defs>
    <marker id="arrowhead" markerWidth="4.8" markerHeight="4.8" refX="4.2" refY="2.4" orient="auto">
      <polygon points="0 0, 4.8 2.4, 0 4.8" fill="#475569"/>
    </marker>
  </defs>
  <style>
    text {
      font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .title { font-size: 28px; font-weight: 700; fill: #0f172a; }
    .subtitle { font-size: 14px; fill: #475569; }
    .guide { fill: rgba(255, 255, 255, 0.76); stroke: #cbd5e1; stroke-width: 1.1; stroke-dasharray: 8,6; }
    .badge { fill: #fff7ed; stroke: #f59e0b; stroke-width: 1; }
    .badge-text { font-size: 10px; font-weight: 700; fill: #9a3412; }
    .node-title { font-size: 12px; font-weight: 700; fill: #0f172a; }
    .node-sub { font-size: 10px; fill: #475569; }
    .edge { fill: none; stroke: #0891b2; stroke-width: 1.8; marker-end: url(#arrowhead); }
    .edge-label-bg { fill: #ffffff; stroke: #e2e8f0; stroke-width: 0.8; }
    .edge-label { font-size: 9px; fill: #475569; }
  </style>

  <rect width="1000" height="720" fill="#f8fafc"/>
  <rect x="24" y="24" width="952" height="672" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="60" y="64" class="title">[项目名称] 技术图</text>
  <text x="60" y="88" class="subtitle">[在这里填写场景、时间范围或结构摘要]</text>

  <rect x="60" y="122" width="148" height="24" rx="10" class="badge"/>
  <text x="134" y="138" class="badge-text" text-anchor="middle">starter canvas</text>

  <rect x="60" y="162" width="880" height="474" rx="18" class="guide"/>
  <rect x="146" y="308" width="176" height="76" rx="10" fill="rgba(34, 211, 238, 0.12)" stroke="#0891b2" stroke-width="1.5"/>
  <rect x="532" y="308" width="220" height="76" rx="10" fill="rgba(52, 211, 153, 0.12)" stroke="#059669" stroke-width="1.5"/>
  <text x="234" y="342" class="node-title" text-anchor="middle">起点块</text>
  <text x="234" y="362" class="node-sub" text-anchor="middle">[留给第一个实体]</text>
  <text x="642" y="342" class="node-title" text-anchor="middle">扩展块</text>
  <text x="642" y="362" class="node-sub" text-anchor="middle">[留给下游结构]</text>

  <path d="M 322 346 H 532" class="edge" id="edge-main"/>
  <rect x="402" y="330" width="48" height="16" rx="4" class="edge-label-bg" data-edge-id="edge-main"/>
  <text x="426" y="341" class="edge-label" text-anchor="middle" data-edge-id="edge-main">关系</text>
</svg>
