<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 680" width="980" height="680" role="img" aria-labelledby="diagram-title diagram-desc">
  <title id="diagram-title">[对比主题] 对比矩阵</title>
  <desc id="diagram-desc">轻量矩阵 starter：保留一列维度头和三列方案头，优先提供可读宽度与清晰层级。</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .title { font-size: 28px; font-weight: 700; fill: #1a1a1a; }
    .subtitle { font-size: 14px; fill: #6a6a6a; }
    .header { fill: #f4e4c1; stroke: #4a4a4a; stroke-width: 1.6; }
    .rowhead { fill: #e8e6e3; stroke: #4a4a4a; stroke-width: 1.2; }
    .yes { fill: #9dd4c7; stroke: #4a4a4a; stroke-width: 1.2; }
    .partial { fill: #f4e4c1; stroke: #4a4a4a; stroke-width: 1.2; }
    .no { fill: #fffdf8; stroke: #4a4a4a; stroke-width: 1.2; }
    .node-title { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
    .label { font-size: 10px; fill: #5a5a5a; }
  </style>

  <rect width="980" height="680" fill="#f8f6f3"/>
  <rect x="24" y="24" width="932" height="632" rx="18" fill="#fffdf8" stroke="#d9d3ca" stroke-width="1.4"/>
  <text x="60" y="64" class="title">[对比主题] 对比矩阵</text>
  <text x="60" y="88" class="subtitle">[在这里填写候选方案、评估维度和结论等级]</text>

  <rect x="80" y="158" width="170" height="56" class="header"/>
  <rect x="250" y="158" width="220" height="56" class="header"/>
  <rect x="470" y="158" width="220" height="56" class="header"/>
  <rect x="690" y="158" width="220" height="56" class="header"/>
  <text x="165" y="192" class="node-title" text-anchor="middle">评估维度</text>
  <text x="360" y="192" class="node-title" text-anchor="middle">方案 A</text>
  <text x="580" y="192" class="node-title" text-anchor="middle">方案 B</text>
  <text x="800" y="192" class="node-title" text-anchor="middle">方案 C</text>

  <rect x="80" y="214" width="170" height="62" class="rowhead"/>
  <rect x="80" y="276" width="170" height="62" class="rowhead"/>
  <rect x="80" y="338" width="170" height="62" class="rowhead"/>
  <rect x="80" y="400" width="170" height="62" class="rowhead"/>
  <text x="165" y="251" class="node-title" text-anchor="middle">复杂度</text>
  <text x="165" y="313" class="node-title" text-anchor="middle">可维护性</text>
  <text x="165" y="375" class="node-title" text-anchor="middle">实施成本</text>
  <text x="165" y="437" class="node-title" text-anchor="middle">交付风险</text>

  <rect x="250" y="214" width="220" height="62" class="yes"/>
  <rect x="470" y="214" width="220" height="62" class="partial"/>
  <rect x="690" y="214" width="220" height="62" class="no"/>

  <rect x="250" y="276" width="220" height="62" class="partial"/>
  <rect x="470" y="276" width="220" height="62" class="yes"/>
  <rect x="690" y="276" width="220" height="62" class="partial"/>

  <rect x="250" y="338" width="220" height="62" class="no"/>
  <rect x="470" y="338" width="220" height="62" class="partial"/>
  <rect x="690" y="338" width="220" height="62" class="yes"/>

  <rect x="250" y="400" width="220" height="62" class="partial"/>
  <rect x="470" y="400" width="220" height="62" class="yes"/>
  <rect x="690" y="400" width="220" height="62" class="partial"/>

  <text x="360" y="251" class="label" text-anchor="middle">低</text>
  <text x="580" y="251" class="label" text-anchor="middle">中</text>
  <text x="800" y="251" class="label" text-anchor="middle">高</text>
  <text x="360" y="313" class="label" text-anchor="middle">中</text>
  <text x="580" y="313" class="label" text-anchor="middle">高</text>
  <text x="800" y="313" class="label" text-anchor="middle">中</text>
  <text x="360" y="375" class="label" text-anchor="middle">高</text>
  <text x="580" y="375" class="label" text-anchor="middle">中</text>
  <text x="800" y="375" class="label" text-anchor="middle">低</text>
  <text x="360" y="437" class="label" text-anchor="middle">中</text>
  <text x="580" y="437" class="label" text-anchor="middle">低</text>
  <text x="800" y="437" class="label" text-anchor="middle">中</text>
</svg>
