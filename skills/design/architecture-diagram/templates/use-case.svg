<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 720" width="1040" height="720" role="img" aria-labelledby="diagram-title diagram-desc">
  <title id="diagram-title">[系统名称] 用例图</title>
  <desc id="diagram-desc">用例 starter：展示 actor、系统边界、关联线以及 include 和 extend 关系的基础骨架。</desc>
  <defs>
    <marker id="open-arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polyline points="0 0, 6 3, 0 6" fill="none" stroke="#5a5a5a" stroke-width="1.2"/>
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .title { font-size: 28px; font-weight: 700; fill: #1a1a1a; }
    .subtitle { font-size: 14px; fill: #6a6a6a; }
    .boundary { fill: rgba(244, 228, 193, 0.22); stroke: #8f7350; stroke-width: 1.6; stroke-dasharray: 8,4; }
    .usecase { fill: #9dd4c7; stroke: #4a4a4a; stroke-width: 1.8; }
    .actor { stroke: #4a4a4a; stroke-width: 2; fill: none; }
    .assoc { fill: none; stroke: #5a5a5a; stroke-width: 1.6; }
    .edge { fill: none; stroke: #5a5a5a; stroke-width: 1.6; }
    .relation { stroke-dasharray: 8,5; marker-end: url(#open-arrow); }
    .label { font-size: 10px; fill: #5a5a5a; }
    .node-title { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
  </style>

  <rect width="1040" height="720" fill="#f8f6f3"/>
  <rect x="24" y="24" width="992" height="672" rx="18" fill="#fffdf8" stroke="#d9d3ca" stroke-width="1.4"/>
  <text x="60" y="64" class="title">[系统名称] 用例图</text>
  <text x="60" y="88" class="subtitle">[在这里填写角色、系统边界和核心用例关系]</text>

  <rect x="300" y="150" width="560" height="380" rx="18" class="boundary"/>
  <text x="330" y="178" class="node-title">系统边界</text>

  <line x1="170" y1="220" x2="170" y2="282" class="actor"/>
  <line x1="138" y1="242" x2="202" y2="242" class="actor"/>
  <line x1="170" y1="282" x2="138" y2="336" class="actor"/>
  <line x1="170" y1="282" x2="202" y2="336" class="actor"/>
  <circle cx="170" cy="198" r="22" class="actor"/>
  <text x="170" y="364" class="label" text-anchor="middle">用户角色</text>

  <ellipse cx="450" cy="240" rx="110" ry="36" class="usecase"/>
  <ellipse cx="710" cy="240" rx="110" ry="36" class="usecase"/>
  <ellipse cx="460" cy="420" rx="120" ry="36" class="usecase"/>
  <ellipse cx="720" cy="420" rx="100" ry="36" class="usecase"/>

  <text x="450" y="245" class="node-title" text-anchor="middle">创建业务请求</text>
  <text x="710" y="245" class="node-title" text-anchor="middle">补充上下文信息</text>
  <text x="460" y="425" class="node-title" text-anchor="middle">查看处理结果</text>
  <text x="720" y="425" class="node-title" text-anchor="middle">接收异常提醒</text>

  <line x1="192" y1="228" x2="340" y2="240" class="assoc"/>
  <line x1="192" y1="258" x2="340" y2="420" class="assoc"/>

  <path d="M 560 240 H 600" class="edge relation" id="edge-include"/>
  <path d="M 620 420 H 580" class="edge relation" id="edge-extend"/>
  <text x="580" y="226" class="label" text-anchor="middle" data-edge-id="edge-include">&lt;&lt;include&gt;&gt;</text>
  <text x="600" y="406" class="label" text-anchor="middle" data-edge-id="edge-extend">&lt;&lt;extend&gt;&gt;</text>
</svg>
