<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 760" width="1040" height="760" role="img" aria-labelledby="diagram-title diagram-desc">
  <title id="diagram-title">[交互主题] 时序图</title>
  <desc id="diagram-desc">轻量时序 starter：保留紧凑 note、阶段带、3 个参与者和一个 alt 分支框，用于扩展真实链路。</desc>
  <defs>
    <marker id="arrow" markerWidth="4.8" markerHeight="4.8" refX="4.2" refY="2.4" orient="auto">
      <polygon points="0 0, 4.8 2.4, 0 4.8" fill="#5a5a5a"/>
    </marker>
    <marker id="arrow-open" markerWidth="5.6" markerHeight="5.6" refX="4.8" refY="2.8" orient="auto">
      <polyline points="0 0, 5.6 2.8, 0 5.6" fill="none" stroke="#5a5a5a" stroke-width="1.1"/>
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .title { font-size: 28px; font-weight: 700; fill: #1a1a1a; }
    .subtitle { font-size: 14px; fill: #6a6a6a; }
    .note-card { fill: #dff3ef; stroke: #a8cfc6; stroke-width: 1.2; }
    .note-title { font-size: 13px; font-weight: 700; fill: #24443d; }
    .note-text { font-size: 11px; fill: #355650; }
    .phase-band { fill: #e9f2fb; stroke: none; }
    .phase-pill { fill: #fffdf8; stroke: #d9d3ca; stroke-width: 1.1; }
    .phase-text { font-size: 12px; font-weight: 700; fill: #4c4c4c; }
    .participant { stroke: #4a4a4a; stroke-width: 2; }
    .source { fill: #a8c5e6; }
    .process { fill: #9dd4c7; }
    .store { fill: #e8e6e3; }
    .lifeline { stroke: #8f8a83; stroke-width: 1.2; stroke-dasharray: 6,5; }
    .activation { fill: #f4e4c1; stroke: #4a4a4a; stroke-width: 1.1; }
    .msg { stroke: #5a5a5a; stroke-width: 1.9; marker-end: url(#arrow); }
    .async { stroke: #5a5a5a; stroke-width: 1.8; stroke-dasharray: 8,6; marker-end: url(#arrow-open); }
    .chip { fill: #fffdf8; stroke: #d9d3ca; stroke-width: 0.9; }
    .label { font-size: 10px; fill: #5a5a5a; }
    .node-title { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
    .frame { fill: none; stroke: #938c81; stroke-width: 1.2; stroke-dasharray: 8,6; }
    .frame-sep { stroke: #938c81; stroke-width: 1; stroke-dasharray: 8,6; }
    .frame-pill { fill: #e8e6e3; stroke: #bcb5ab; stroke-width: 0.9; }
    .frame-title { font-size: 10px; font-weight: 700; fill: #5a5a5a; }
    .branch-title { font-size: 11px; font-weight: 700; fill: #5a5a5a; }
    .legend { font-size: 11px; fill: #6a6a6a; }
  </style>

  <rect width="1040" height="760" fill="#f8f6f3"/>
  <rect x="24" y="24" width="992" height="712" rx="18" fill="#fffdf8" stroke="#d9d3ca" stroke-width="1.4"/>
  <text x="60" y="64" class="title">[交互主题] 时序图</text>
  <text x="60" y="88" class="subtitle">[在这里填写参与者、阶段、关键消息和一个主要分支]</text>

  <rect x="60" y="108" width="320" height="72" rx="14" class="note-card"/>
  <text x="84" y="132" class="note-title">关键约束</text>
  <text x="84" y="154" class="note-text">
    <tspan x="84" dy="0">1. note 保持紧凑，时序区留给消息和分支。</tspan>
    <tspan x="84" dy="15">2. 阶段标题和分支标题都放在真实时间区。</tspan>
  </text>

  <rect x="60" y="250" width="920" height="28" rx="14" class="phase-band"/>
  <rect x="84" y="254" width="170" height="20" rx="10" class="phase-pill"/>
  <text x="169" y="268" text-anchor="middle" class="phase-text">阶段一：请求与处理</text>

  <rect x="80" y="190" width="120" height="44" rx="12" class="participant source"/>
  <rect x="370" y="190" width="120" height="44" rx="12" class="participant process"/>
  <rect x="660" y="190" width="120" height="44" rx="12" class="participant store"/>
  <text x="140" y="217" class="node-title" text-anchor="middle">调用方</text>
  <text x="430" y="217" class="node-title" text-anchor="middle">接口层</text>
  <text x="720" y="217" class="node-title" text-anchor="middle">处理服务</text>

  <line x1="140" y1="234" x2="140" y2="668" class="lifeline"/>
  <line x1="430" y1="234" x2="430" y2="668" class="lifeline"/>
  <line x1="720" y1="234" x2="720" y2="668" class="lifeline"/>

  <rect x="422" y="312" width="16" height="336" class="activation"/>
  <rect x="712" y="384" width="16" height="196" class="activation"/>

  <line x1="140" y1="320" x2="430" y2="320" class="msg"/>
  <rect x="244" y="304" width="72" height="16" rx="5" class="chip"/>
  <text x="280" y="315" text-anchor="middle" class="label">1. 发起请求</text>

  <line x1="430" y1="392" x2="720" y2="392" class="msg"/>
  <rect x="548" y="376" width="68" height="16" rx="5" class="chip"/>
  <text x="582" y="387" text-anchor="middle" class="label">2. 下发任务</text>

  <rect x="398" y="458" width="366" height="128" rx="12" class="frame" data-frame-id="status-alt"/>
  <rect x="414" y="466" width="34" height="16" rx="5" class="frame-pill"/>
  <text x="431" y="477" text-anchor="middle" class="frame-title">alt</text>
  <text x="470" y="478" class="branch-title" data-frame-id="status-alt" data-branch="1">[成功返回]</text>
  <line x1="414" y1="526" x2="748" y2="526" class="frame-sep" data-frame-id="status-alt"/>
  <text x="470" y="548" class="branch-title" data-frame-id="status-alt" data-branch="2">[失败关闭]</text>

  <line x1="720" y1="492" x2="430" y2="492" class="async" data-frame-id="status-alt" data-branch="1"/>
  <rect x="566" y="476" width="84" height="16" rx="5" class="chip"/>
  <text x="608" y="487" text-anchor="middle" class="label">3. 返回成功</text>

  <line x1="720" y1="548" x2="430" y2="548" class="async" data-frame-id="status-alt" data-branch="2"/>
  <rect x="566" y="532" width="84" height="16" rx="5" class="chip"/>
  <text x="608" y="543" text-anchor="middle" class="label">4. 返回失败</text>

  <line x1="430" y1="620" x2="140" y2="620" class="msg"/>
  <rect x="244" y="604" width="72" height="16" rx="5" class="chip"/>
  <text x="280" y="615" text-anchor="middle" class="label">5. 返回结果</text>

  <text x="60" y="676" class="legend">图例：实线 = 同步请求，虚线 = 异步通知，激活条 = 处理窗口。</text>
</svg>
