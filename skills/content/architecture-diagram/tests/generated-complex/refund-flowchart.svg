<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 980" width="1200" height="980" role="img" aria-labelledby="diagram-title diagram-desc">
  <!-- spec
  type: flowchart
  title: 退款审批流程图
  style: claude-official
  direction: top-to-bottom
  nodes:
    - id: start
      label: 用户提交申请
      shape: terminal
    - id: normalize
      label: 读取订单与申请
      shape: process
    - id: eligibility
      label: 符合自动退款条件?
      shape: decision
    - id: auto-refund
      label: 自动退款
      shape: process
    - id: manual-review
      label: 人工复核
      shape: process
    - id: review-pass
      label: 复核通过?
      shape: decision
    - id: success
      label: 退款成功并通知
      shape: terminal
    - id: rejected
      label: 通知拒绝原因
      shape: terminal
  edges:
    - id: edge-start-normalize
      from: start
      to: normalize
    - id: edge-normalize-eligibility
      from: normalize
      to: eligibility
    - id: edge-eligibility-auto
      from: eligibility
      to: auto-refund
      label: 是
    - id: edge-eligibility-manual
      from: eligibility
      to: manual-review
      label: 否
    - id: edge-manual-review
      from: manual-review
      to: review-pass
    - id: edge-auto-success
      from: auto-refund
      to: success
    - id: edge-review-success
      from: review-pass
      to: success
      label: 通过
    - id: edge-review-reject
      from: review-pass
      to: rejected
      label: 拒绝
  -->
  <title id="diagram-title">退款审批流程图</title>
  <desc id="diagram-desc">复杂分支流程：自动退款、人工复核和拒绝通知，所有分支箭头都落到实体边界。</desc>
  <defs>
    <marker id="arrow" markerWidth="4.8" markerHeight="4.8" refX="4.2" refY="2.4" orient="auto">
      <polygon points="0 0, 4.8 2.4, 0 4.8" fill="#5a5a5a"/>
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .title { font-size: 28px; font-weight: 700; fill: #1a1a1a; }
    .subtitle { font-size: 14px; fill: #6a6a6a; }
    .terminal { fill: #a8c5e6; stroke: #4a4a4a; stroke-width: 2; }
    .process { fill: #9dd4c7; stroke: #4a4a4a; stroke-width: 2; }
    .output { fill: #f4e4c1; stroke: #4a4a4a; stroke-width: 2; }
    .decision { fill: #e8e6e3; stroke: #4a4a4a; stroke-width: 2; }
    .edge { fill: none; stroke: #5a5a5a; stroke-width: 2; marker-end: url(#arrow); }
    .chip { fill: #fffdf8; stroke: #d9d3ca; stroke-width: 0.8; }
    .label { font-size: 10px; fill: #5a5a5a; }
    .node-title { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
    .node-sub { font-size: 10px; fill: #5a5a5a; }
  </style>

  <rect width="1200" height="980" fill="#f8f6f3"/>
  <rect x="28" y="28" width="1144" height="924" rx="18" fill="#fffdf8" stroke="#d9d3ca" stroke-width="1.4"/>
  <text x="70" y="70" class="title">退款审批流程图</text>
  <text x="70" y="96" class="subtitle">自动退款、人工复核与拒绝通知的主路径和分支收敛</text>

  <rect x="500" y="126" width="200" height="58" rx="20" class="terminal"/>
  <text x="600" y="158" class="node-title" text-anchor="middle">用户提交申请</text>
  <text x="600" y="176" class="node-sub" text-anchor="middle">退款单进入队列</text>

  <rect x="458" y="238" width="284" height="76" rx="12" class="process"/>
  <text x="600" y="270" class="node-title" text-anchor="middle">读取订单与申请</text>
  <text x="600" y="290" class="node-sub" text-anchor="middle">校验订单、金额、售后窗口</text>

  <path d="M 600 360 L 730 426 L 600 492 L 470 426 Z" class="decision"/>
  <text x="600" y="422" class="node-title" text-anchor="middle">符合自动退款条件？</text>

  <rect x="780" y="560" width="230" height="76" rx="12" class="process"/>
  <text x="895" y="592" class="node-title" text-anchor="middle">自动退款</text>
  <text x="895" y="612" class="node-sub" text-anchor="middle">原路退回 / 记录流水</text>

  <rect x="190" y="560" width="230" height="76" rx="12" class="process"/>
  <text x="305" y="592" class="node-title" text-anchor="middle">人工复核</text>
  <text x="305" y="612" class="node-sub" text-anchor="middle">补充材料 / 风险确认</text>

  <path d="M 305 680 L 430 742 L 305 804 L 180 742 Z" class="decision"/>
  <text x="305" y="738" class="node-title" text-anchor="middle">复核通过？</text>

  <rect x="490" y="870" width="220" height="62" rx="18" class="terminal output"/>
  <text x="600" y="898" class="node-title" text-anchor="middle">退款成功并通知</text>
  <text x="600" y="916" class="node-sub" text-anchor="middle">返回结果 / 关闭申请</text>

  <rect x="160" y="870" width="250" height="62" rx="18" class="terminal output"/>
  <text x="285" y="898" class="node-title" text-anchor="middle">通知拒绝原因</text>
  <text x="285" y="916" class="node-sub" text-anchor="middle">保留申诉入口</text>

  <path d="M 600 184 V 238" class="edge" id="edge-start-normalize"/>
  <path d="M 600 314 V 360" class="edge" id="edge-normalize-eligibility"/>
  <path d="M 730 426 H 895 V 560" class="edge" id="edge-eligibility-auto"/>
  <path d="M 470 426 H 305 V 560" class="edge" id="edge-eligibility-manual"/>
  <path d="M 305 636 V 680" class="edge" id="edge-manual-review"/>
  <path d="M 895 636 V 830 H 640 V 870" class="edge" id="edge-auto-success"/>
  <path d="M 430 742 H 560 V 870" class="edge" id="edge-review-success"/>
  <path d="M 180 742 H 112 V 842 H 285 V 870" class="edge" id="edge-review-reject"/>

  <rect x="758" y="410" width="34" height="18" rx="5" class="chip" data-edge-id="edge-eligibility-auto"/>
  <text x="775" y="423" class="label" text-anchor="middle" data-edge-id="edge-eligibility-auto">是</text>
  <rect x="408" y="410" width="34" height="18" rx="5" class="chip" data-edge-id="edge-eligibility-manual"/>
  <text x="425" y="423" class="label" text-anchor="middle" data-edge-id="edge-eligibility-manual">否</text>
  <rect x="458" y="726" width="46" height="18" rx="5" class="chip" data-edge-id="edge-review-success"/>
  <text x="481" y="739" class="label" text-anchor="middle" data-edge-id="edge-review-success">通过</text>
  <rect x="122" y="726" width="46" height="18" rx="5" class="chip" data-edge-id="edge-review-reject"/>
  <text x="145" y="739" class="label" text-anchor="middle" data-edge-id="edge-review-reject">拒绝</text>
</svg>
