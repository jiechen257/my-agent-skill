<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" width="760" height="460">
  <defs>
    <marker id="arrow" markerWidth="4.8" markerHeight="4.8" refX="4.2" refY="2.4" orient="auto">
      <polygon points="0 0, 4.8 2.4, 0 4.8" fill="#5a5a5a"/>
    </marker>
  </defs>
  <style>
    .service { fill: #9dd4c7; stroke: #4a4a4a; stroke-width: 2; }
    .chip { fill: #fffdf8; stroke: #d9d3ca; stroke-width: 0.8; }
    .label { font-size: 10px; fill: #5a5a5a; }
    .edge { fill: none; stroke: #5a5a5a; stroke-width: 2; marker-end: url(#arrow); }
    .node-title { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
  </style>
  <rect width="760" height="460" fill="#f8f6f3"/>
  <rect x="24" y="24" width="712" height="412" rx="18" fill="#fffdf8" stroke="#d9d3ca" stroke-width="1.4"/>
  <rect x="380" y="180" width="160" height="80" rx="12" class="service"/>
  <text x="460" y="208" class="node-title" text-anchor="middle">处理服务</text>
  <path d="M 120 220 H 380" class="edge" id="edge-main"/>
  <rect x="208" y="204" width="84" height="16" rx="5" class="chip" data-edge-id="edge-main"/>
  <text x="250" y="215" class="label" text-anchor="middle" data-edge-id="edge-main">标签留出间距</text>
  <rect x="304" y="180" width="72" height="16" rx="5" class="chip"/>
  <text x="340" y="191" class="label" text-anchor="middle">旁侧标签</text>
</svg>
