<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" width="720" height="520">
  <defs>
    <marker id="arrow-open" markerWidth="5.6" markerHeight="5.6" refX="4.8" refY="2.8" orient="auto">
      <polyline points="0 0, 5.6 2.8, 0 5.6" fill="none" stroke="#5a5a5a" stroke-width="1.1"/>
    </marker>
  </defs>
  <style>
    .participant { fill: #a8c5e6; stroke: #4a4a4a; stroke-width: 2; }
    .service { fill: #9dd4c7; stroke: #4a4a4a; stroke-width: 2; }
    .store { fill: #e8e6e3; stroke: #4a4a4a; stroke-width: 2; }
    .lifeline { stroke: #8f8a83; stroke-width: 1.2; stroke-dasharray: 6,5; }
    .activation { fill: #f4e4c1; stroke: #4a4a4a; stroke-width: 1.1; }
    .async { stroke: #5a5a5a; stroke-width: 1.8; stroke-dasharray: 8,6; marker-end: url(#arrow-open); }
    .frame { fill: none; stroke: #938c81; stroke-width: 1.2; stroke-dasharray: 8,6; }
    .frame-sep { stroke: #938c81; stroke-width: 1; stroke-dasharray: 8,6; }
    .frame-pill { fill: #e8e6e3; stroke: #bcb5ab; stroke-width: 0.9; }
    .legend { font-size: 11px; fill: #6a6a6a; }
  </style>
  <rect width="720" height="520" fill="#f8f6f3"/>
  <rect x="24" y="24" width="672" height="472" rx="18" fill="#fffdf8" stroke="#d9d3ca" stroke-width="1.4"/>
  <rect x="74" y="214" width="104" height="44" rx="12" class="participant"/>
  <rect x="308" y="214" width="104" height="44" rx="12" class="service"/>
  <rect x="542" y="214" width="104" height="44" rx="12" class="store"/>
  <line x1="126" y1="258" x2="126" y2="444" class="lifeline"/>
  <line x1="360" y1="258" x2="360" y2="444" class="lifeline"/>
  <line x1="594" y1="258" x2="594" y2="444" class="lifeline"/>
  <rect x="352" y="310" width="16" height="94" class="activation"/>
  <rect x="586" y="360" width="16" height="36" class="activation"/>
  <rect x="346" y="296" width="260" height="128" rx="12" class="frame" data-frame-id="settle"/>
  <rect x="362" y="304" width="34" height="16" rx="5" class="frame-pill"/>
  <text x="379" y="315" text-anchor="middle" font-size="10">alt</text>
  <text x="412" y="316" font-size="11" data-frame-id="settle" data-branch="1">[支付成功]</text>
  <line x1="362" y1="346" x2="590" y2="346" class="frame-sep" data-frame-id="settle"/>
  <text x="412" y="368" font-size="11" data-frame-id="settle" data-branch="2">[支付失败]</text>
  <line x1="360" y1="376" x2="594" y2="376" class="async" data-frame-id="settle" data-branch="1"/>
  <line x1="594" y1="392" x2="360" y2="392" class="async" data-frame-id="settle" data-branch="2"/>
  <text x="60" y="436" class="legend">图例：branch 1 被画到了 separator 下方。</text>
</svg>
