<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 860" width="1320" height="860" role="img" aria-labelledby="t d">
  <!-- spec
  type: data-flow
  title: 千问卡片数据流图
  style: claude-official
  direction: left-to-right
  regions:
    - id: data_lane
      label: 数据流
    - id: control_lane
      label: 控制面
  nodes:
    - id: api
      label: 业务后端 API
    - id: ssr
      label: SSR Server 拉取
    - id: adapter
      label: React Adapter 归一
    - id: cache
      label: Edge Cache
    - id: client
      label: 客户端拉取
    - id: hydration
      label: Hydration 层
    - id: render
      label: React 渲染层
    - id: validator
      label: A2UI Schema Validator
    - id: obs
      label: Observability Sink
  edges:
    - id: edge_api_ssr
      from: api
      to: ssr
      label: schema/props/slot_data
    - id: edge_ssr_adapter
      from: ssr
      to: adapter
      label: raw payload
    - id: edge_adapter_cache
      from: adapter
      to: cache
      label: normalized_props/server_state
    - id: edge_cache_client
      from: cache
      to: client
      label: cached payload + TTL
    - id: edge_client_hydration
      from: client
      to: hydration
      label: client state
    - id: edge_hydration_render
      from: hydration
      to: render
      label: hydrated props
    - id: edge_validator_adapter
      from: validator
      to: adapter
      label: schema gate
    - id: edge_error_obs
      from: validator
      to: obs
      label: validation errors
  -->
  <title id="t">千问卡片数据流图</title>
  <desc id="d">主数据流与控制面分 lane 展示，并标注每段 payload 摘要。</desc>
  <defs>
    <marker id="arrow" markerWidth="5" markerHeight="5" refX="4.4" refY="2.5" orient="auto"><polygon points="0 0, 5 2.5, 0 5" fill="#5a5a5a"/></marker>
    <marker id="arrow-soft" markerWidth="5" markerHeight="5" refX="4.4" refY="2.5" orient="auto"><polygon points="0 0, 5 2.5, 0 5" fill="#8a8178"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.07"/></filter>
  </defs>
  <style>
    text { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .title { font-size: 30px; font-weight: 700; fill: #1a1a1a; }
    .subtitle { font-size: 15px; fill: #6a6a6a; }
    .region { fill: rgba(248,246,243,0.74); stroke: #d9d3ca; stroke-width: 1.6; }
    .region-label { font-size: 12px; font-weight: 700; fill: #5a5a5a; }
    .source { fill: #a8c5e6; stroke: #d9d3ca; stroke-width: 1.6; filter: url(#shadow); }
    .process { fill: #9dd4c7; stroke: #d9d3ca; stroke-width: 1.6; filter: url(#shadow); }
    .store { fill: #e8e6e3; stroke: #d9d3ca; stroke-width: 1.6; filter: url(#shadow); }
    .sink { fill: #f4e4c1; stroke: #d9d3ca; stroke-width: 1.6; filter: url(#shadow); }
    .note { fill: #dff3ef; stroke: #d9d3ca; stroke-width: 1.2; }
    .edge { fill: none; stroke: #5a5a5a; stroke-width: 2; marker-end: url(#arrow); }
    .edge-soft { fill: none; stroke: #8a8178; stroke-width: 1.8; stroke-dasharray: 7 5; marker-end: url(#arrow-soft); }
    .node-title { font-size: 14px; font-weight: 700; fill: #1a1a1a; }
    .node-sub { font-size: 11px; fill: #5a5a5a; }
    .chip { fill: #fffdf8; stroke: #d9d3ca; stroke-width: 1; }
    .chip-text { font-size: 10px; font-weight: 600; fill: #1a1a1a; }
    .legend-text { font-size: 11px; fill: #5a5a5a; }
  </style>
  <rect width="1320" height="860" fill="#f8f6f3"/>
  <rect x="24" y="24" width="1272" height="812" rx="14" fill="#fffdf8" stroke="#d9d3ca"/>
  <text x="60" y="70" class="title">千问卡片数据流图</text>
  <text x="60" y="96" class="subtitle">payload 生成、归一、缓存、客户端注入与渲染消费</text>
  <rect x="60" y="134" width="1200" height="350" rx="14" class="region"/>
  <text x="84" y="164" class="region-label">数据流 lane</text>
  <rect x="80" y="532" width="1160" height="176" rx="14" class="region"/>
  <text x="104" y="562" class="region-label">控制面 lane</text>
  <rect id="api" x="90" y="256" width="150" height="76" rx="12" class="source"/><text x="165" y="286" text-anchor="middle" class="node-title">业务后端 API</text><text x="165" y="306" text-anchor="middle" class="node-sub">卡片数据接口</text>
  <rect id="ssr" x="290" y="256" width="150" height="76" rx="12" class="process"/><text x="365" y="286" text-anchor="middle" class="node-title">SSR Server</text><text x="365" y="306" text-anchor="middle" class="node-sub">拉取数据</text>
  <rect id="adapter" x="490" y="256" width="170" height="76" rx="12" class="process"/><text x="575" y="286" text-anchor="middle" class="node-title">React Adapter</text><text x="575" y="306" text-anchor="middle" class="node-sub">归一 props/state</text>
  <rect id="cache" x="710" y="256" width="150" height="76" rx="12" class="store"/><text x="785" y="286" text-anchor="middle" class="node-title">Edge Cache</text><text x="785" y="306" text-anchor="middle" class="node-sub">TTL / invalidation</text>
  <rect id="client" x="910" y="218" width="150" height="66" rx="12" class="source"/><text x="985" y="258" text-anchor="middle" class="node-title">客户端拉取</text>
  <rect id="hydration" x="910" y="346" width="150" height="66" rx="12" class="process"/><text x="985" y="374" text-anchor="middle" class="node-title">Hydration 层</text><text x="985" y="392" text-anchor="middle" class="node-sub">注入 client state</text>
  <rect id="render" x="1110" y="285" width="120" height="70" rx="12" class="sink"/><text x="1170" y="316" text-anchor="middle" class="node-title">React</text><text x="1170" y="334" text-anchor="middle" class="node-sub">渲染层消费</text>
  <rect id="validator" x="260" y="596" width="250" height="62" rx="12" class="note"/><text x="385" y="632" text-anchor="middle" class="node-title">A2UI Schema Validator</text>
  <rect id="obs" x="760" y="596" width="250" height="62" rx="12" class="store"/><text x="885" y="632" text-anchor="middle" class="node-title">Observability Sink</text>
  <path id="edge_api_ssr" data-edge-id="edge_api_ssr" data-edge-label="schema/props/slot_data" d="M 240 294 H 290" class="edge"/>
  <path id="edge_ssr_adapter" data-edge-id="edge_ssr_adapter" data-edge-label="raw payload" d="M 440 294 H 490" class="edge"/>
  <path id="edge_adapter_cache" data-edge-id="edge_adapter_cache" data-edge-label="normalized_props/server_state" d="M 660 294 H 710" class="edge"/>
  <path id="edge_cache_client" data-edge-id="edge_cache_client" data-edge-label="cached payload + TTL" d="M 860 294 H 885 V 251 H 910" class="edge"/>
  <path id="edge_client_hydration" data-edge-id="edge_client_hydration" data-edge-label="client state" d="M 985 284 V 346" class="edge"/>
  <path id="edge_hydration_render" data-edge-id="edge_hydration_render" data-edge-label="hydrated props" d="M 1060 379 H 1085 V 320 H 1110" class="edge"/>
  <path id="edge_validator_adapter" data-edge-id="edge_validator_adapter" data-edge-label="schema gate" d="M 385 596 V 474 H 575 V 332" class="edge-soft"/>
  <path id="edge_error_obs" data-edge-id="edge_error_obs" data-edge-label="validation errors" d="M 510 627 H 760" class="edge-soft"/>
  <rect x="244" y="268" width="98" height="20" rx="6" class="chip"/><text x="293" y="282" text-anchor="middle" class="chip-text">schema/props</text>
  <rect x="452" y="268" width="74" height="20" rx="6" class="chip"/><text x="489" y="282" text-anchor="middle" class="chip-text">raw payload</text>
  <rect x="653" y="268" width="116" height="20" rx="6" class="chip"/><text x="711" y="282" text-anchor="middle" class="chip-text">normalized props</text>
  <rect x="868" y="228" width="80" height="20" rx="6" class="chip"/><text x="908" y="242" text-anchor="middle" class="chip-text">cache + TTL</text>
  <rect x="1002" y="306" width="74" height="20" rx="6" class="chip"/><text x="1039" y="320" text-anchor="middle" class="chip-text">client state</text>
  <rect x="1068" y="336" width="86" height="20" rx="6" class="chip"/><text x="1111" y="350" text-anchor="middle" class="chip-text">hydrated props</text>
  <rect x="506" y="456" width="78" height="20" rx="6" class="chip"/><text x="545" y="470" text-anchor="middle" class="chip-text">schema gate</text>
  <rect x="606" y="606" width="106" height="20" rx="6" class="chip"/><text x="659" y="620" text-anchor="middle" class="chip-text">validation errors</text>
  <path id="edge_legend_data" data-edge-id="edge_legend_data" d="M 530 762 H 586" class="edge"/><text x="596" y="766" class="legend-text">数据流</text>
  <path id="edge_legend_control" data-edge-id="edge_legend_control" d="M 690 762 H 746" class="edge-soft"/><text x="756" y="766" class="legend-text">控制流 / 错误回流</text>
</svg>
