<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 840" width="1320" height="840" role="img" aria-labelledby="t d">
  <!-- spec
  type: use-case
  title: QWork 平台用例图
  style: claude-official
  direction: left-right-actors
  nodes:
    - id: developer
      label: 业务开发者
    - id: reviewer
      label: 卡片审核者
    - id: runtime
      label: QClaw Runtime
    - id: backend
      label: 业务后端 API
    - id: uc_ssr
      label: 发起 SSR 卡片开发请求
    - id: uc_mock
      label: 切换 Mock 调试状态
    - id: uc_history
      label: 查看任务历史
    - id: uc_review
      label: 审核卡片产物
    - id: uc_rollback
      label: 回滚到上一版本
    - id: uc_events
      label: 接收事件流
    - id: uc_schema
      label: 推送数据 schema
  edges:
    - id: edge_dev_ssr
      from: developer
      to: uc_ssr
    - id: edge_dev_mock
      from: developer
      to: uc_mock
    - id: edge_dev_history
      from: developer
      to: uc_history
    - id: edge_reviewer_review
      from: reviewer
      to: uc_review
    - id: edge_reviewer_rollback
      from: reviewer
      to: uc_rollback
    - id: edge_review_history
      from: uc_review
      to: uc_history
      label: include
    - id: edge_rollback_review
      from: uc_rollback
      to: uc_review
      label: extend
    - id: edge_runtime_events
      from: runtime
      to: uc_events
    - id: edge_backend_schema
      from: backend
      to: uc_schema
  -->
  <title id="t">QWork 平台用例图</title>
  <desc id="d">actors 放在系统边界外，用例放在边界内，include 和 extend 用虚线标注。</desc>
  <defs><marker id="open-arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><polyline points="0 0, 6 3, 0 6" fill="none" stroke="#8a8178" stroke-width="1.2"/></marker><filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.07"/></filter></defs>
  <style>
    text { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .title { font-size: 30px; font-weight: 700; fill: #1a1a1a; }
    .subtitle { font-size: 15px; fill: #6a6a6a; }
    .system-boundary { fill: rgba(244,228,193,0.24); stroke: #d9d3ca; stroke-width: 1.6; stroke-dasharray: 8 5; }
    .usecase { fill: #9dd4c7; stroke: #d9d3ca; stroke-width: 1.6; filter: url(#shadow); }
    .support { fill: #dff3ef; stroke: #d9d3ca; stroke-width: 1.6; filter: url(#shadow); }
    .actor { stroke: #5a5a5a; stroke-width: 2; fill: none; }
    .edge { fill: none; stroke: #5a5a5a; stroke-width: 1.7; }
    .edge-soft { fill: none; stroke: #8a8178; stroke-width: 1.6; stroke-dasharray: 7 5; marker-end: url(#open-arrow); }
    .node-title { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
    .label { font-size: 11px; font-weight: 600; fill: #1a1a1a; }
  </style>
  <rect width="1320" height="840" fill="#f8f6f3"/><rect x="24" y="24" width="1272" height="792" rx="14" fill="#fffdf8" stroke="#d9d3ca"/>
  <text x="60" y="70" class="title">QWork 平台用例图</text><text x="60" y="96" class="subtitle">业务开发、审核、Runtime 与后端 API 的平台能力关系</text>
  <rect x="330" y="132" width="660" height="560" rx="18" class="system-boundary"/><text x="360" y="164" class="node-title">QWork 平台边界</text>
  <circle id="developer" cx="150" cy="180" r="20" class="actor"/><line x1="150" y1="200" x2="150" y2="258" class="actor"/><line x1="120" y1="222" x2="180" y2="222" class="actor"/><line x1="150" y1="258" x2="122" y2="310" class="actor"/><line x1="150" y1="258" x2="178" y2="310" class="actor"/><text x="150" y="338" text-anchor="middle" class="label">业务开发者</text>
  <circle id="reviewer" cx="150" cy="480" r="20" class="actor"/><line x1="150" y1="500" x2="150" y2="558" class="actor"/><line x1="120" y1="522" x2="180" y2="522" class="actor"/><line x1="150" y1="558" x2="122" y2="610" class="actor"/><line x1="150" y1="558" x2="178" y2="610" class="actor"/><text x="150" y="638" text-anchor="middle" class="label">卡片审核者</text>
  <circle id="runtime" cx="1140" cy="210" r="20" class="actor"/><line x1="1140" y1="230" x2="1140" y2="288" class="actor"/><line x1="1110" y1="252" x2="1170" y2="252" class="actor"/><line x1="1140" y1="288" x2="1112" y2="340" class="actor"/><line x1="1140" y1="288" x2="1168" y2="340" class="actor"/><text x="1140" y="368" text-anchor="middle" class="label">QClaw Runtime</text>
  <circle id="backend" cx="1140" cy="506" r="20" class="actor"/><line x1="1140" y1="526" x2="1140" y2="584" class="actor"/><line x1="1110" y1="548" x2="1170" y2="548" class="actor"/><line x1="1140" y1="584" x2="1112" y2="636" class="actor"/><line x1="1140" y1="584" x2="1168" y2="636" class="actor"/><text x="1140" y="664" text-anchor="middle" class="label">业务后端 API</text>
  <ellipse id="uc_ssr" cx="500" cy="220" rx="132" ry="38" class="usecase"/><text x="500" y="225" text-anchor="middle" class="node-title">发起 SSR 卡片开发请求</text>
  <ellipse id="uc_mock" cx="770" cy="220" rx="126" ry="38" class="usecase"/><text x="770" y="225" text-anchor="middle" class="node-title">切换 Mock 调试状态</text>
  <ellipse id="uc_history" cx="640" cy="344" rx="112" ry="36" class="support"/><text x="640" y="349" text-anchor="middle" class="node-title">查看任务历史</text>
  <ellipse id="uc_review" cx="500" cy="500" rx="112" ry="36" class="usecase"/><text x="500" y="505" text-anchor="middle" class="node-title">审核卡片产物</text>
  <ellipse id="uc_rollback" cx="770" cy="500" rx="118" ry="36" class="usecase"/><text x="770" y="505" text-anchor="middle" class="node-title">回滚到上一版本</text>
  <ellipse id="uc_events" cx="812" cy="344" rx="108" ry="36" class="support"/><text x="812" y="349" text-anchor="middle" class="node-title">接收事件流</text>
  <ellipse id="uc_schema" cx="770" cy="620" rx="122" ry="36" class="support"/><text x="770" y="625" text-anchor="middle" class="node-title">推送数据 schema</text>
  <path id="edge_dev_ssr" data-edge-id="edge_dev_ssr" d="M 180 222 H 368" class="edge"/>
  <path id="edge_dev_mock" data-edge-id="edge_dev_mock" d="M 180 242 H 644" class="edge"/>
  <path id="edge_dev_history" data-edge-id="edge_dev_history" d="M 180 262 H 330 V 344 H 528" class="edge"/>
  <path id="edge_reviewer_review" data-edge-id="edge_reviewer_review" d="M 180 522 H 388" class="edge"/>
  <path id="edge_reviewer_rollback" data-edge-id="edge_reviewer_rollback" d="M 180 542 H 330 V 500 H 652" class="edge"/>
  <path id="edge_review_history" data-edge-id="edge_review_history" data-edge-label="include" d="M 500 464 V 380 H 640" class="edge-soft"/><text x="516" y="420" class="label" data-edge-id="edge_review_history">&lt;&lt;include&gt;&gt;</text>
  <path id="edge_rollback_review" data-edge-id="edge_rollback_review" data-edge-label="extend" d="M 652 500 H 612" class="edge-soft"/><text x="626" y="486" class="label" data-edge-id="edge_rollback_review">&lt;&lt;extend&gt;&gt;</text>
  <path id="edge_runtime_events" data-edge-id="edge_runtime_events" d="M 1110 252 H 990 V 344 H 920" class="edge"/>
  <path id="edge_backend_schema" data-edge-id="edge_backend_schema" d="M 1110 548 H 990 V 620 H 892" class="edge"/>
</svg>
