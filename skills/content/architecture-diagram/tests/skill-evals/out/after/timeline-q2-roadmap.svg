<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 760" width="1320" height="760" role="img" aria-labelledby="t d">
  <!-- spec
  type: timeline
  title: QClaw 业务 Adapter Q2 路线图
  style: claude-official
  direction: left-to-right
  regions:
    - id: may
      label: 2026-05 SSR Adapter MVP
    - id: june
      label: 2026-06 Mock Adapter 接入
    - id: july
      label: 2026-07 A2UI + 治理
  nodes:
    - id: may_contract
      label: 协议契约定义 + Adapter Registry
    - id: may_ssr
      label: SSR React Adapter 开发
    - id: june_protocol
      label: Card Mock 协议 + 数据 Schema
    - id: june_mock
      label: Mock Adapter 开发 + 联调
    - id: july_a2ui
      label: A2UI Schema 接入
    - id: july_policy
      label: Hooks/Policy 治理 + QA
  edges:
    - id: edge_axis
      from: may
      to: july
      label: 2026 Q2
  -->
  <title id="t">QClaw 业务 Adapter Q2 路线图</title>
  <desc id="d">5 月到 7 月横向时间轴，任务条按半月对齐，里程碑独立标注。</desc>
  <defs><marker id="arrow" markerWidth="5" markerHeight="5" refX="4.4" refY="2.5" orient="auto"><polygon points="0 0, 5 2.5, 0 5" fill="#5a5a5a"/></marker><filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.07"/></filter></defs>
  <style>
    text { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .title { font-size: 30px; font-weight: 700; fill: #1a1a1a; }
    .subtitle { font-size: 15px; fill: #6a6a6a; }
    .region { fill: rgba(248,246,243,0.74); stroke: #d9d3ca; stroke-width: 1.6; }
    .month { fill: #f4e4c1; stroke: #d9d3ca; stroke-width: 1.4; filter: url(#shadow); }
    .bar-a { fill: #9dd4c7; stroke: #d9d3ca; stroke-width: 1.2; filter: url(#shadow); }
    .bar-b { fill: #a8c5e6; stroke: #d9d3ca; stroke-width: 1.2; filter: url(#shadow); }
    .marker { fill: #c6503f; stroke: #fffdf8; stroke-width: 3; }
    .edge { fill: none; stroke: #5a5a5a; stroke-width: 2; marker-end: url(#arrow); }
    .node-title { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
    .label { font-size: 11px; fill: #5a5a5a; }
  </style>
  <rect width="1320" height="760" fill="#f8f6f3"/><rect x="24" y="24" width="1272" height="712" rx="14" fill="#fffdf8" stroke="#d9d3ca"/>
  <text x="60" y="70" class="title">QClaw 业务 Adapter Q2 路线图</text><text x="60" y="96" class="subtitle">SSR Adapter → Mock Adapter → A2UI 接入与治理</text>
  <path id="edge_axis" data-edge-id="edge_axis" d="M 120 206 H 1200" class="edge"/>
  <rect x="120" y="140" width="330" height="72" rx="14" class="month"/><text x="285" y="182" text-anchor="middle" class="node-title">5 月：SSR Adapter MVP</text>
  <rect x="495" y="140" width="330" height="72" rx="14" class="month"/><text x="660" y="182" text-anchor="middle" class="node-title">6 月：Mock Adapter 接入</text>
  <rect x="870" y="140" width="330" height="72" rx="14" class="month"/><text x="1035" y="182" text-anchor="middle" class="node-title">7 月：A2UI 接入 + 治理</text>
  <rect x="120" y="260" width="160" height="46" rx="10" class="bar-a"/><text x="200" y="288" text-anchor="middle" class="node-title">协议契约定义</text>
  <rect x="286" y="260" width="164" height="46" rx="10" class="bar-b"/><text x="368" y="288" text-anchor="middle" class="node-title">Registry 落地</text>
  <rect x="286" y="342" width="164" height="46" rx="10" class="bar-a"/><text x="368" y="370" text-anchor="middle" class="node-title">SSR Adapter 开发</text>
  <rect x="495" y="260" width="160" height="46" rx="10" class="bar-a"/><text x="575" y="288" text-anchor="middle" class="node-title">Mock 协议梳理</text>
  <rect x="661" y="260" width="164" height="46" rx="10" class="bar-b"/><text x="743" y="288" text-anchor="middle" class="node-title">数据 Schema</text>
  <rect x="661" y="342" width="164" height="46" rx="10" class="bar-a"/><text x="743" y="370" text-anchor="middle" class="node-title">Mock 开发联调</text>
  <rect x="870" y="260" width="160" height="46" rx="10" class="bar-a"/><text x="950" y="288" text-anchor="middle" class="node-title">A2UI Schema 接入</text>
  <rect x="1036" y="342" width="164" height="46" rx="10" class="bar-b"/><text x="1118" y="370" text-anchor="middle" class="node-title">治理监控 QA</text>
  <line x1="450" y1="224" x2="450" y2="520" stroke="#d9d3ca" stroke-width="1.4"/><circle cx="450" cy="520" r="10" class="marker"/><text x="392" y="552" class="label">5/31 SSR Adapter 灰度</text>
  <line x1="825" y1="224" x2="825" y2="520" stroke="#d9d3ca" stroke-width="1.4"/><circle cx="825" cy="520" r="10" class="marker"/><text x="764" y="552" class="label">6/30 Mock Adapter 全量</text>
  <line x1="1200" y1="224" x2="1200" y2="520" stroke="#d9d3ca" stroke-width="1.4"/><circle cx="1200" cy="520" r="10" class="marker"/><text x="1134" y="552" class="label">7/31 Q2 收官评审</text>
</svg>
