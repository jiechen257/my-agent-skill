<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1480" width="1280" height="1480" role="img" aria-labelledby="t d">
  <!-- spec
  type: flowchart
  title: QClaw 用户使用流程
  style: claude-official
  direction: top-to-bottom
  regions:
    - id: r1
      label: 入口与任务归一
    - id: r2
      label: Adapter 选择
    - id: r3
      label: 执行与确认
    - id: r4
      label: 收尾
  nodes:
    - id: n_request
      label: 用户发起请求
      shape: terminal
      region: r1
    - id: n_normalize
      label: QClaw 归一化任务
      shape: process
      region: r1
    - id: n_context
      label: 读取业务上下文
      shape: process
      region: r2
    - id: n_decide_scene
      label: 业务场景？
      shape: decision
      region: r2
    - id: n_ssr
      label: SSR React Adapter
      shape: io
      region: r2
    - id: n_mock
      label: Card Mock Adapter
      shape: io
      region: r2
    - id: n_ext
      label: 后续业务 Adapter
      shape: io
      region: r2
    - id: n_bus
      label: 三路汇聚
      shape: bus
      region: r3
    - id: n_run
      label: 创建 run + 锁定 session lane
      shape: process
      region: r3
    - id: n_selector
      label: Runtime Selector 选择执行器
      shape: process
      region: r3
    - id: n_loop
      label: Agent Loop 调 Skills / MCP
      shape: process
      region: r3
    - id: n_decide_confirm
      label: 需要确认？
      shape: decision
      region: r3
    - id: n_confirm
      label: 回到 QWork 交互
      shape: io
      region: r4
    - id: n_output
      label: 输出事件 + 业务产物
      shape: terminal
      region: r4
  edges:
    - id: e1
      from: n_request
      to: n_normalize
    - id: e2
      from: n_normalize
      to: n_context
    - id: e3
      from: n_context
      to: n_decide_scene
    - id: e4
      from: n_decide_scene
      to: n_ssr
      label: SSR
    - id: e5
      from: n_decide_scene
      to: n_mock
      label: Mock
    - id: e6
      from: n_decide_scene
      to: n_ext
      label: 扩展
    - id: e7
      from: n_ssr
      to: n_bus
    - id: e8
      from: n_mock
      to: n_bus
    - id: e9
      from: n_ext
      to: n_bus
    - id: e10
      from: n_bus
      to: n_run
    - id: e11
      from: n_run
      to: n_selector
    - id: e12
      from: n_selector
      to: n_loop
    - id: e13
      from: n_loop
      to: n_decide_confirm
    - id: e14
      from: n_decide_confirm
      to: n_confirm
      label: Yes
    - id: e15
      from: n_decide_confirm
      to: n_output
      label: "No"
    - id: e16
      from: n_confirm
      to: n_loop
      label: 用户补充信息
  -->
  <title id="t">QClaw 用户使用流程</title>
  <desc id="d">从请求到产物输出的四阶段流程，含场景分支与用户确认回流。</desc>

  <defs>
    <marker id="arrow" markerWidth="5" markerHeight="5" refX="4.4" refY="2.5" orient="auto">
      <polygon points="0 0, 5 2.5, 0 5" fill="#5a5a5a"/>
    </marker>
    <marker id="arrow-soft" markerWidth="5" markerHeight="5" refX="4.4" refY="2.5" orient="auto">
      <polygon points="0 0, 5 2.5, 0 5" fill="#8a8178"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.07"/>
    </filter>
  </defs>

  <style>
    text { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .title { font-size: 30px; font-weight: 700; fill: #1a1a1a; }
    .subtitle { font-size: 15px; fill: #6a6a6a; }
    .region-label { font-size: 12px; font-weight: 700; fill: #5a5a5a; letter-spacing: 0.05em; }
    .node-title { font-size: 14px; font-weight: 700; fill: #1a1a1a; }
    .node-sub { font-size: 11px; fill: #5a5a5a; }
    .terminal { fill: #a8c5e6; stroke: #d9d3ca; stroke-width: 1.6; filter: url(#shadow); }
    .process { fill: #9dd4c7; stroke: #d9d3ca; stroke-width: 1.6; filter: url(#shadow); }
    .io { fill: #f4e4c1; stroke: #d9d3ca; stroke-width: 1.6; filter: url(#shadow); }
    .decision { fill: #fff7e8; stroke: #d9d3ca; stroke-width: 1.6; filter: url(#shadow); }
    .bus { fill: #dff3ef; stroke: #d9d3ca; stroke-width: 1.6; filter: url(#shadow); }
    .region { fill: rgba(248,246,243,0.72); stroke: #d9d3ca; stroke-width: 1.6; }
    .edge { fill: none; stroke: #5a5a5a; stroke-width: 2; marker-end: url(#arrow); }
    .edge-soft { fill: none; stroke: #8a8178; stroke-width: 1.7; stroke-dasharray: 6 5; marker-end: url(#arrow-soft); }
    .edge-label-bg { fill: #fffdf8; stroke: #d9d3ca; stroke-width: 1; }
    .edge-label-text { font-size: 11px; font-weight: 600; fill: #1a1a1a; }
    .legend-text { font-size: 11px; fill: #5a5a5a; }
  </style>

  <rect width="1280" height="1480" fill="#f8f6f3"/>
  <rect x="24" y="24" width="1232" height="1432" rx="14" fill="#fffdf8" stroke="#d9d3ca" stroke-width="1.4"/>
  <text x="60" y="68" class="title">QClaw 用户使用流程</text>
  <text x="60" y="92" class="subtitle">入口归一 → Adapter 选择 → 执行与确认 → 产物输出</text>

  <!-- Phase 1 -->
  <rect x="60" y="120" width="1160" height="184" rx="14" class="region"/>
  <text x="80" y="146" class="region-label">入口与任务归一</text>
  <rect id="n_request" x="420" y="158" width="440" height="56" rx="22" class="terminal"/>
  <text x="640" y="192" class="node-title" text-anchor="middle">用户通过 Chat / Pipeline 发起业务请求</text>
  <rect id="n_normalize" x="420" y="234" width="440" height="56" rx="12" class="process"/>
  <text x="640" y="258" class="node-title" text-anchor="middle">QClaw 归一化任务</text>
  <text x="640" y="276" class="node-sub" text-anchor="middle">intent / scene / operation / context</text>

  <!-- Phase 2 -->
  <rect x="60" y="324" width="1160" height="320" rx="14" class="region"/>
  <text x="80" y="350" class="region-label">ADAPTER 选择</text>
  <rect id="n_context" x="420" y="362" width="440" height="56" rx="12" class="process"/>
  <text x="640" y="396" class="node-title" text-anchor="middle">读取业务上下文 (schema / design / code)</text>
  <path id="n_decide_scene" d="M 640 446 L 800 524 L 640 602 L 480 524 Z" class="decision"/>
  <text x="640" y="520" class="node-title" text-anchor="middle">业务场景？</text>
  <text x="640" y="540" class="node-sub" text-anchor="middle">三路分支</text>
  <rect id="n_ssr" x="100" y="608" width="280" height="58" rx="12" class="io"/>
  <text x="240" y="636" class="node-title" text-anchor="middle">SSR React Adapter</text>
  <text x="240" y="654" class="node-sub" text-anchor="middle">需求 → 代码 → 部署 → 验证</text>
  <rect id="n_mock" x="500" y="608" width="280" height="58" rx="12" class="io"/>
  <text x="640" y="636" class="node-title" text-anchor="middle">Card Mock Adapter</text>
  <text x="640" y="654" class="node-sub" text-anchor="middle">协议 → 场景 → Mock 配置</text>
  <rect id="n_ext" x="900" y="608" width="280" height="58" rx="12" class="io"/>
  <text x="1040" y="636" class="node-title" text-anchor="middle">后续业务 Adapter</text>
  <text x="1040" y="654" class="node-sub" text-anchor="middle">协议对接 / 排查 / 治理</text>

  <!-- Phase 3 -->
  <rect x="60" y="690" width="1160" height="448" rx="14" class="region"/>
  <text x="80" y="716" class="region-label">执行与确认</text>
  <rect id="n_bus" x="500" y="728" width="280" height="44" rx="22" class="bus"/>
  <text x="640" y="755" class="node-title" text-anchor="middle">三路汇聚（Adapter Bus）</text>
  <rect id="n_run" x="420" y="794" width="440" height="56" rx="12" class="process"/>
  <text x="640" y="818" class="node-title" text-anchor="middle">创建 run，锁定 session lane</text>
  <text x="640" y="836" class="node-sub" text-anchor="middle">runId / sessionId / cancel / replay</text>
  <rect id="n_selector" x="420" y="870" width="440" height="56" rx="12" class="process"/>
  <text x="640" y="894" class="node-title" text-anchor="middle">Runtime Selector 选择执行器</text>
  <text x="640" y="912" class="node-sub" text-anchor="middle">本地 Claude / 云端宝子</text>
  <rect id="n_loop" x="420" y="946" width="440" height="56" rx="12" class="process"/>
  <text x="640" y="970" class="node-title" text-anchor="middle">Agent Loop 调用 Skills / MCP</text>
  <text x="640" y="988" class="node-sub" text-anchor="middle">tool events / artifact events / policy</text>
  <path id="n_decide_confirm" d="M 640 1024 L 800 1080 L 640 1136 L 480 1080 Z" class="decision"/>
  <text x="640" y="1078" class="node-title" text-anchor="middle">需要确认？</text>
  <text x="640" y="1096" class="node-sub" text-anchor="middle">澄清 / 审批 / 风险</text>

  <!-- Phase 4 -->
  <rect x="60" y="1158" width="1160" height="180" rx="14" class="region"/>
  <text x="80" y="1184" class="region-label">收尾</text>
  <rect id="n_confirm" x="120" y="1196" width="380" height="58" rx="12" class="io"/>
  <text x="310" y="1224" class="node-title" text-anchor="middle">回到 QWork 交互</text>
  <text x="310" y="1242" class="node-sub" text-anchor="middle">用户补充信息或确认继续</text>
  <rect id="n_output" x="780" y="1196" width="380" height="58" rx="22" class="terminal"/>
  <text x="970" y="1224" class="node-title" text-anchor="middle">输出事件与业务产物</text>
  <text x="970" y="1242" class="node-sub" text-anchor="middle">代码 / 部署 / Mock / 模板 / 记录</text>

  <!-- Edges -->
  <path id="e1" data-edge-id="e1" class="edge" d="M 640 214 L 640 234"/>
  <path id="e2" data-edge-id="e2" class="edge" d="M 640 290 L 640 362"/>
  <path id="e3" data-edge-id="e3" class="edge" d="M 640 418 L 640 446"/>
  <!-- decision branches: SSR (left), Mock (down), 扩展 (right) -->
  <path id="e4" data-edge-id="e4" data-edge-label="SSR" class="edge" d="M 480 524 L 240 524 L 240 608"/>
  <path id="e5" data-edge-id="e5" data-edge-label="Mock" class="edge" d="M 640 602 L 640 608"/>
  <path id="e6" data-edge-id="e6" data-edge-label="扩展" class="edge" d="M 800 524 L 1040 524 L 1040 608"/>
  <!-- branch labels (chips on branch-owned segments) -->
  <rect class="edge-label-bg" x="350" y="510" width="42" height="22" rx="6"/>
  <text class="edge-label-text" x="371" y="525" text-anchor="middle">SSR</text>
  <rect class="edge-label-bg" x="618" y="568" width="48" height="22" rx="6"/>
  <text class="edge-label-text" x="642" y="583" text-anchor="middle">Mock</text>
  <rect class="edge-label-bg" x="884" y="510" width="46" height="22" rx="6"/>
  <text class="edge-label-text" x="907" y="525" text-anchor="middle">扩展</text>
  <!-- bus convergence (branch-owned folds) -->
  <path id="e7" data-edge-id="e7" class="edge" d="M 240 666 L 240 728 L 500 728 L 500 750"/>
  <path id="e8" data-edge-id="e8" class="edge" d="M 640 666 L 640 728"/>
  <path id="e9" data-edge-id="e9" class="edge" d="M 1040 666 L 1040 728 L 780 728 L 780 750"/>
  <path id="e10" data-edge-id="e10" class="edge" d="M 640 772 L 640 794"/>
  <path id="e11" data-edge-id="e11" class="edge" d="M 640 850 L 640 870"/>
  <path id="e12" data-edge-id="e12" class="edge" d="M 640 926 L 640 946"/>
  <path id="e13" data-edge-id="e13" class="edge" d="M 640 1002 L 640 1024"/>
  <!-- confirm decision branches -->
  <path id="e14" data-edge-id="e14" data-edge-label="Yes" class="edge" d="M 480 1080 L 310 1080 L 310 1196"/>
  <path id="e15" data-edge-id="e15" data-edge-label="No" class="edge" d="M 800 1080 L 970 1080 L 970 1196"/>
  <rect class="edge-label-bg" x="380" y="1066" width="40" height="22" rx="6"/>
  <text class="edge-label-text" x="400" y="1081" text-anchor="middle">Yes</text>
  <rect class="edge-label-bg" x="858" y="1066" width="36" height="22" rx="6"/>
  <text class="edge-label-text" x="876" y="1081" text-anchor="middle">No</text>
  <!-- feedback loop -->
  <path id="e16" data-edge-id="e16" data-edge-label="用户补充信息" class="edge-soft" d="M 120 1225 L 60 1225 L 60 974 L 420 974"/>
  <rect class="edge-label-bg" x="42" y="1100" width="100" height="22" rx="6"/>
  <text class="edge-label-text" x="92" y="1115" text-anchor="middle">用户补充信息</text>

  <!-- Legend -->
  <rect x="60" y="1364" width="1160" height="60" rx="12" fill="#fffdf8" stroke="#d9d3ca" stroke-width="1.2"/>
  <line x1="86" y1="1390" x2="126" y2="1390" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="140" y="1394" class="legend-text">实线（edge）：主流程推进</text>
  <line x1="450" y1="1390" x2="490" y2="1390" stroke="#8a8178" stroke-width="1.7" stroke-dasharray="6 5" marker-end="url(#arrow-soft)"/>
  <text x="504" y="1394" class="legend-text">虚线（edge-soft）：回流 / 反馈循环</text>
  <path d="M 880 1380 L 906 1395 L 880 1410 L 854 1395 Z" fill="#fff7e8" stroke="#d9d3ca" stroke-width="1.6"/>
  <text x="924" y="1399" class="legend-text">菱形：决策节点（Yes/No 或选项）</text>
</svg>
