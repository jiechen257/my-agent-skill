<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1420 980" width="1420" height="980" role="img" aria-labelledby="t d">
  <!-- spec
  type: sequence
  title: Mock 调试场景调用时序
  style: claude-official
  direction: top-to-bottom
  nodes:
    - id: user
      label: 用户
    - id: chatui
      label: ChatUI
    - id: runtime
      label: QClaw Runtime
    - id: adapter
      label: MockAdapter
    - id: tool
      label: ToolService
    - id: store
      label: Mock 数据存储
  edges:
    - id: edge_user_chat
      from: user
      to: chatui
      label: 打开 Mock 模式
    - id: edge_chat_runtime
      from: chatui
      to: runtime
      label: send intent
    - id: edge_runtime_adapter
      from: runtime
      to: adapter
      label: dispatch switch_mock_state
    - id: edge_adapter_tool
      from: adapter
      to: tool
      label: read_schema(card_id)
    - id: edge_tool_adapter
      from: tool
      to: adapter
      label: schema
    - id: edge_adapter_store
      from: adapter
      to: store
      label: load_mock_state(X)
    - id: edge_store_adapter
      from: store
      to: adapter
      label: state payload
    - id: edge_adapter_runtime
      from: adapter
      to: runtime
      label: emit mock.state.applied
    - id: edge_runtime_chat
      from: runtime
      to: chatui
      label: stream event
    - id: edge_chat_user
      from: chatui
      to: user
      label: 渲染确认
  -->
  <title id="t">Mock 调试场景调用时序</title>
  <desc id="d">用户切换 Mock 状态 X 的完整调用链路，含 schema 读取、状态加载与事件回传。</desc>
  <defs>
    <marker id="arrow" markerWidth="5" markerHeight="5" refX="4.4" refY="2.5" orient="auto"><polygon points="0 0, 5 2.5, 0 5" fill="#5a5a5a"/></marker>
    <marker id="arrow-soft" markerWidth="5" markerHeight="5" refX="4.4" refY="2.5" orient="auto"><polygon points="0 0, 5 2.5, 0 5" fill="#8a8178"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.07"/></filter>
  </defs>
  <style>
    text { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .title { font-size: 30px; font-weight: 700; fill: #1a1a1a; }
    .subtitle { font-size: 15px; fill: #6a6a6a; }
    .participant { fill: #9dd4c7; stroke: #d9d3ca; stroke-width: 1.6; filter: url(#shadow); }
    .actor-box { fill: #a8c5e6; stroke: #d9d3ca; stroke-width: 1.6; filter: url(#shadow); }
    .store { fill: #e8e6e3; stroke: #d9d3ca; stroke-width: 1.6; filter: url(#shadow); }
    .lifeline { stroke: #8a8178; stroke-width: 1.2; stroke-dasharray: 6 5; }
    .activation { fill: #f4e4c1; stroke: #d9d3ca; stroke-width: 1; }
    .edge { fill: none; stroke: #5a5a5a; stroke-width: 1.9; marker-end: url(#arrow); }
    .edge-soft { fill: none; stroke: #8a8178; stroke-width: 1.8; stroke-dasharray: 7 5; marker-end: url(#arrow-soft); }
    .node-title { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
    .chip { fill: #fffdf8; stroke: #d9d3ca; stroke-width: 1; }
    .chip-text { font-size: 10px; font-weight: 600; fill: #1a1a1a; }
    .legend-text { font-size: 11px; fill: #5a5a5a; }
  </style>
  <rect width="1420" height="980" fill="#f8f6f3"/><rect x="24" y="24" width="1372" height="932" rx="14" fill="#fffdf8" stroke="#d9d3ca"/>
  <text x="60" y="70" class="title">Mock 调试场景调用时序</text>
  <text x="60" y="96" class="subtitle">状态 X 切换：intent → schema → mock state → event stream → UI 确认</text>
  <rect id="user" x="70" y="138" width="140" height="48" rx="12" class="actor-box"/><text x="140" y="168" text-anchor="middle" class="node-title">用户</text>
  <rect id="chatui" x="285" y="138" width="140" height="48" rx="12" class="participant"/><text x="355" y="168" text-anchor="middle" class="node-title">ChatUI</text>
  <rect id="runtime" x="500" y="138" width="160" height="48" rx="12" class="participant"/><text x="580" y="168" text-anchor="middle" class="node-title">QClaw Runtime</text>
  <rect id="adapter" x="735" y="138" width="150" height="48" rx="12" class="participant"/><text x="810" y="168" text-anchor="middle" class="node-title">MockAdapter</text>
  <rect id="tool" x="960" y="138" width="150" height="48" rx="12" class="participant"/><text x="1035" y="168" text-anchor="middle" class="node-title">ToolService</text>
  <rect id="store" x="1185" y="138" width="160" height="48" rx="12" class="store"/><text x="1265" y="168" text-anchor="middle" class="node-title">Mock 数据存储</text>
  <line x1="140" y1="186" x2="140" y2="858" class="lifeline"/><line x1="355" y1="186" x2="355" y2="858" class="lifeline"/><line x1="580" y1="186" x2="580" y2="858" class="lifeline"/><line x1="810" y1="186" x2="810" y2="858" class="lifeline"/><line x1="1035" y1="186" x2="1035" y2="858" class="lifeline"/><line x1="1265" y1="186" x2="1265" y2="858" class="lifeline"/>
  <rect x="347" y="236" width="16" height="584" class="activation"/><rect x="572" y="288" width="16" height="438" class="activation"/><rect x="802" y="340" width="16" height="310" class="activation"/>
  <path id="edge_user_chat" data-edge-id="edge_user_chat" d="M 140 242 H 355" class="edge"/><rect x="172" y="222" width="150" height="20" rx="6" class="chip"/><text x="247" y="236" text-anchor="middle" class="chip-text">打开 Mock 模式，切换 X</text>
  <path id="edge_chat_runtime" data-edge-id="edge_chat_runtime" d="M 355 302 H 580" class="edge"/><rect x="414" y="282" width="86" height="20" rx="6" class="chip"/><text x="457" y="296" text-anchor="middle" class="chip-text">发送 intent</text>
  <path id="edge_runtime_adapter" data-edge-id="edge_runtime_adapter" d="M 580 362 H 810" class="edge"/><rect x="610" y="342" width="166" height="20" rx="6" class="chip"/><text x="693" y="356" text-anchor="middle" class="chip-text">dispatch switch_mock_state</text>
  <path id="edge_adapter_tool" data-edge-id="edge_adapter_tool" d="M 810 422 H 1035" class="edge"/><rect x="856" y="402" width="128" height="20" rx="6" class="chip"/><text x="920" y="416" text-anchor="middle" class="chip-text">read_schema(card_id)</text>
  <path id="edge_tool_adapter" data-edge-id="edge_tool_adapter" d="M 1035 482 H 810" class="edge-soft"/><rect x="900" y="462" width="54" height="20" rx="6" class="chip"/><text x="927" y="476" text-anchor="middle" class="chip-text">schema</text>
  <path id="edge_adapter_store" data-edge-id="edge_adapter_store" d="M 810 542 H 1265" class="edge"/><rect x="968" y="522" width="140" height="20" rx="6" class="chip"/><text x="1038" y="536" text-anchor="middle" class="chip-text">load_mock_state('X')</text>
  <path id="edge_store_adapter" data-edge-id="edge_store_adapter" d="M 1265 602 H 810" class="edge-soft"/><rect x="990" y="582" width="92" height="20" rx="6" class="chip"/><text x="1036" y="596" text-anchor="middle" class="chip-text">state payload</text>
  <path id="edge_adapter_runtime" data-edge-id="edge_adapter_runtime" d="M 810 662 H 580" class="edge-soft"/><rect x="617" y="642" width="152" height="20" rx="6" class="chip"/><text x="693" y="656" text-anchor="middle" class="chip-text">mock.state.applied</text>
  <path id="edge_runtime_chat" data-edge-id="edge_runtime_chat" d="M 580 722 H 355" class="edge-soft"/><rect x="426" y="702" width="84" height="20" rx="6" class="chip"/><text x="468" y="716" text-anchor="middle" class="chip-text">stream event</text>
  <path id="edge_chat_user" data-edge-id="edge_chat_user" d="M 355 782 H 140" class="edge-soft"/><rect x="184" y="762" width="126" height="20" rx="6" class="chip"/><text x="247" y="776" text-anchor="middle" class="chip-text">渲染状态切换确认</text>
  <path id="edge_legend_sync" data-edge-id="edge_legend_sync" d="M 544 900 H 600" class="edge"/><text x="610" y="904" class="legend-text">同步调用</text>
  <path id="edge_legend_return" data-edge-id="edge_legend_return" d="M 704 900 H 760" class="edge-soft"/><text x="770" y="904" class="legend-text">返回 / 事件通知</text>
</svg>
