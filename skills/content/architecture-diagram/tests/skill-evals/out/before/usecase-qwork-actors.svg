<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 760" width="1160" height="760" role="img" aria-labelledby="t d">
  <title id="t">QWork 平台用例图</title>
  <desc id="d">旧版用例基线：角色和用例齐备，但边界类名和关系边语义不稳定。</desc>
  <defs><marker id="open-arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><polyline points="0 0, 6 3, 0 6" fill="none" stroke="#5a5a5a" stroke-width="1.2"/></marker></defs>
  <style>
    text { font-family: -apple-system, "PingFang SC", sans-serif; }
    .title { font-size: 28px; font-weight: 700; fill: #1a1a1a; }
    .boundary { fill: rgba(244,228,193,0.25); stroke: #8f7350; stroke-width: 1.6; stroke-dasharray: 8 4; }
    .usecase { fill: #9dd4c7; stroke: #4a4a4a; stroke-width: 1.8; }
    .actor { stroke: #4a4a4a; stroke-width: 2; fill: none; }
    .edge { fill: none; stroke: #5a5a5a; stroke-width: 1.6; }
    .edge-soft { fill: none; stroke: #5a5a5a; stroke-width: 1.6; stroke-dasharray: 7 5; marker-end: url(#open-arrow); }
    .label { font-size: 11px; fill: #5a5a5a; }
    .node { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
  </style>
  <rect width="1160" height="760" fill="#f8f6f3"/><rect x="24" y="24" width="1112" height="712" rx="18" fill="#fffdf8" stroke="#d9d3ca"/>
  <text x="60" y="70" class="title">QWork 平台用例图</text>
  <rect x="310" y="132" width="540" height="500" rx="18" class="boundary"/><text x="340" y="164" class="node">QWork 平台</text>
  <circle cx="150" cy="176" r="20" class="actor"/><line x1="150" y1="196" x2="150" y2="252" class="actor"/><line x1="120" y1="218" x2="180" y2="218" class="actor"/><line x1="150" y1="252" x2="122" y2="304" class="actor"/><line x1="150" y1="252" x2="178" y2="304" class="actor"/><text x="150" y="330" text-anchor="middle" class="label">业务开发者</text>
  <circle cx="150" cy="452" r="20" class="actor"/><line x1="150" y1="472" x2="150" y2="528" class="actor"/><line x1="120" y1="494" x2="180" y2="494" class="actor"/><line x1="150" y1="528" x2="122" y2="580" class="actor"/><line x1="150" y1="528" x2="178" y2="580" class="actor"/><text x="150" y="606" text-anchor="middle" class="label">卡片审核者</text>
  <ellipse cx="460" cy="210" rx="112" ry="34" class="usecase"/><text x="460" y="215" text-anchor="middle" class="node">发起 SSR 开发请求</text>
  <ellipse cx="690" cy="210" rx="112" ry="34" class="usecase"/><text x="690" y="215" text-anchor="middle" class="node">切换 Mock 状态</text>
  <ellipse cx="560" cy="320" rx="104" ry="34" class="usecase"/><text x="560" y="325" text-anchor="middle" class="node">查看任务历史</text>
  <ellipse cx="460" cy="460" rx="104" ry="34" class="usecase"/><text x="460" y="465" text-anchor="middle" class="node">审核卡片产物</text>
  <ellipse cx="690" cy="460" rx="104" ry="34" class="usecase"/><text x="690" y="465" text-anchor="middle" class="node">回滚到上一版本</text>
  <path d="M 180 220 H 350" class="edge"/><path d="M 180 238 H 578" class="edge"/><path d="M 180 512 H 356" class="edge"/><path d="M 180 530 H 586" class="edge"/>
  <path d="M 460 426 V 354 H 560" class="edge-soft"/><text x="478" y="388" class="label">&lt;&lt;include&gt;&gt;</text>
  <path d="M 586 460 H 564" class="edge-soft"/><text x="580" y="446" class="label">&lt;&lt;extend&gt;&gt;</text>
</svg>
