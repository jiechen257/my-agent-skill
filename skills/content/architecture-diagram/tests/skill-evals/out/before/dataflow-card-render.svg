<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1220 760" width="1220" height="760" role="img" aria-labelledby="t d">
  <title id="t">千问卡片数据流图</title>
  <desc id="d">旧版数据流基线：数据流与控制流混排，payload 以视觉 chip 表示。</desc>
  <defs>
    <marker id="arrow" markerWidth="5" markerHeight="5" refX="4.4" refY="2.5" orient="auto"><polygon points="0 0, 5 2.5, 0 5" fill="#5a5a5a"/></marker>
  </defs>
  <style>
    text { font-family: -apple-system, "PingFang SC", sans-serif; }
    .title { font-size: 28px; font-weight: 700; fill: #1a1a1a; }
    .sub { font-size: 14px; fill: #6a6a6a; }
    .lane { fill: #fffdf8; stroke: #d9d3ca; stroke-width: 1.4; }
    .source { fill: #a8c5e6; stroke: #4a4a4a; stroke-width: 2; }
    .process { fill: #9dd4c7; stroke: #4a4a4a; stroke-width: 2; }
    .store { fill: #e8e6e3; stroke: #4a4a4a; stroke-width: 2; }
    .sink { fill: #f4e4c1; stroke: #4a4a4a; stroke-width: 2; }
    .edge { fill: none; stroke: #5a5a5a; stroke-width: 2; marker-end: url(#arrow); }
    .edge-soft { fill: none; stroke: #8f7350; stroke-width: 1.7; stroke-dasharray: 7 5; marker-end: url(#arrow); }
    .node { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
    .label { font-size: 11px; fill: #5a5a5a; }
    .chip { fill: #fffdf8; stroke: #d9d3ca; stroke-width: 1; }
  </style>
  <rect width="1220" height="760" fill="#f8f6f3"/>
  <rect x="24" y="24" width="1172" height="712" rx="18" fill="#fffdf8" stroke="#d9d3ca"/>
  <text x="60" y="68" class="title">千问卡片数据流图</text>
  <text x="60" y="94" class="sub">业务后端 API → SSR → Adapter → Cache → Client → React 渲染</text>
  <rect x="64" y="140" width="1090" height="230" rx="16" class="lane"/>
  <rect x="64" y="430" width="1090" height="170" rx="16" class="lane"/>
  <text x="84" y="168" class="label">数据流 lane</text>
  <text x="84" y="458" class="label">控制面 lane</text>
  <rect x="90" y="222" width="150" height="70" rx="12" class="source"/><text x="165" y="262" text-anchor="middle" class="node">业务后端 API</text>
  <rect x="300" y="222" width="150" height="70" rx="12" class="process"/><text x="375" y="262" text-anchor="middle" class="node">SSR Server</text>
  <rect x="510" y="222" width="170" height="70" rx="12" class="process"/><text x="595" y="262" text-anchor="middle" class="node">React Adapter</text>
  <rect x="750" y="222" width="150" height="70" rx="12" class="store"/><text x="825" y="262" text-anchor="middle" class="node">Edge Cache</text>
  <rect x="960" y="222" width="150" height="70" rx="12" class="sink"/><text x="1035" y="262" text-anchor="middle" class="node">React 渲染层</text>
  <rect x="318" y="490" width="210" height="60" rx="12" class="process"/><text x="423" y="524" text-anchor="middle" class="node">A2UI Validator</text>
  <rect x="700" y="490" width="210" height="60" rx="12" class="store"/><text x="805" y="524" text-anchor="middle" class="node">Observability Sink</text>
  <path d="M 240 257 H 300" class="edge"/>
  <path d="M 450 257 H 510" class="edge"/>
  <path d="M 680 257 H 750" class="edge"/>
  <path d="M 900 257 H 960" class="edge"/>
  <path d="M 423 490 V 304" class="edge-soft"/>
  <path d="M 805 490 V 314 H 595" class="edge-soft"/>
  <rect x="252" y="238" width="40" height="18" rx="5" class="chip"/><text x="272" y="251" text-anchor="middle" class="label">schema</text>
  <rect x="462" y="238" width="38" height="18" rx="5" class="chip"/><text x="481" y="251" text-anchor="middle" class="label">props</text>
  <rect x="692" y="238" width="48" height="18" rx="5" class="chip"/><text x="716" y="251" text-anchor="middle" class="label">TTL</text>
</svg>
