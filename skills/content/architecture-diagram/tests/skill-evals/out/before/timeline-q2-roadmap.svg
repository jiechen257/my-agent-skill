<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" width="1180" height="720" role="img" aria-labelledby="t d">
  <title id="t">Q2 Adapter 路线图</title>
  <desc id="d">旧版时间轴基线：月度任务和里程碑齐备，但缺少结构化 spec。</desc>
  <defs><marker id="arrow" markerWidth="5" markerHeight="5" refX="4.4" refY="2.5" orient="auto"><polygon points="0 0, 5 2.5, 0 5" fill="#5a5a5a"/></marker></defs>
  <style>
    text { font-family: -apple-system, "PingFang SC", sans-serif; }
    .title { font-size: 28px; font-weight: 700; fill: #1a1a1a; }
    .month { fill: #f4e4c1; stroke: #d9d3ca; stroke-width: 1.4; }
    .bar { fill: #9dd4c7; stroke: #d9d3ca; stroke-width: 1.2; }
    .marker { fill: #c6503f; }
    .edge { fill: none; stroke: #5a5a5a; stroke-width: 2; marker-end: url(#arrow); }
    .label { font-size: 11px; fill: #5a5a5a; }
    .node { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
  </style>
  <rect width="1180" height="720" fill="#f8f6f3"/><rect x="24" y="24" width="1132" height="672" rx="18" fill="#fffdf8" stroke="#d9d3ca"/>
  <text x="60" y="70" class="title">QClaw 业务 Adapter Q2 路线图</text>
  <path d="M 120 210 H 1040" class="edge"/>
  <rect x="120" y="150" width="290" height="64" rx="14" class="month"/><text x="265" y="188" text-anchor="middle" class="node">5 月 SSR Adapter MVP</text>
  <rect x="445" y="150" width="290" height="64" rx="14" class="month"/><text x="590" y="188" text-anchor="middle" class="node">6 月 Mock Adapter 接入</text>
  <rect x="770" y="150" width="270" height="64" rx="14" class="month"/><text x="905" y="188" text-anchor="middle" class="node">7 月 A2UI + 治理</text>
  <rect x="130" y="286" width="130" height="36" rx="10" class="bar"/><text x="195" y="310" text-anchor="middle" class="label">协议契约定义</text>
  <rect x="265" y="342" width="145" height="36" rx="10" class="bar"/><text x="337" y="366" text-anchor="middle" class="label">SSR Adapter 开发</text>
  <rect x="455" y="286" width="130" height="36" rx="10" class="bar"/><text x="520" y="310" text-anchor="middle" class="label">Mock 协议梳理</text>
  <rect x="590" y="342" width="145" height="36" rx="10" class="bar"/><text x="662" y="366" text-anchor="middle" class="label">Mock Adapter 开发</text>
  <rect x="780" y="286" width="120" height="36" rx="10" class="bar"/><text x="840" y="310" text-anchor="middle" class="label">A2UI 接入</text>
  <rect x="905" y="342" width="135" height="36" rx="10" class="bar"/><text x="972" y="366" text-anchor="middle" class="label">治理监控 QA</text>
  <circle cx="410" cy="450" r="10" class="marker"/><text x="374" y="480" class="label">5/31 灰度</text>
  <circle cx="735" cy="450" r="10" class="marker"/><text x="695" y="480" class="label">6/30 全量</text>
  <circle cx="1040" cy="450" r="10" class="marker"/><text x="986" y="480" class="label">7/31 评审</text>
</svg>
