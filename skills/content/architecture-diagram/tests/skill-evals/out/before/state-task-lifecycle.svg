<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 760" width="1120" height="760" role="img" aria-labelledby="t d">
  <title id="t">QClaw run 生命周期状态机</title>
  <desc id="d">旧版状态机基线：状态齐备，但迁移缺少结构化 guard 属性。</desc>
  <defs><marker id="arrow" markerWidth="5" markerHeight="5" refX="4.4" refY="2.5" orient="auto"><polygon points="0 0, 5 2.5, 0 5" fill="#5a5a5a"/></marker></defs>
  <style>
    text { font-family: -apple-system, "PingFang SC", sans-serif; }
    .title { font-size: 28px; font-weight: 700; fill: #1a1a1a; }
    .state { fill: #9dd4c7; stroke: #4a4a4a; stroke-width: 2; }
    .final-state { fill: #e8e6e3; stroke: #4a4a4a; stroke-width: 2; }
    .initial { fill: #1a1a1a; }
    .final { fill: #fffdf8; stroke: #1a1a1a; stroke-width: 2; }
    .edge { fill: none; stroke: #5a5a5a; stroke-width: 2; marker-end: url(#arrow); }
    .label { font-size: 10px; fill: #5a5a5a; }
    .node { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
  </style>
  <rect width="1120" height="760" fill="#f8f6f3"/><rect x="24" y="24" width="1072" height="712" rx="18" fill="#fffdf8" stroke="#d9d3ca"/>
  <text x="60" y="70" class="title">QClaw 任务 run 生命周期</text>
  <circle cx="100" cy="210" r="12" class="initial"/>
  <rect x="190" y="176" width="150" height="68" rx="16" class="state"/><text x="265" y="216" text-anchor="middle" class="node">pending</text>
  <rect x="430" y="176" width="150" height="68" rx="16" class="state"/><text x="505" y="216" text-anchor="middle" class="node">running</text>
  <rect x="670" y="176" width="170" height="68" rx="16" class="state"/><text x="755" y="216" text-anchor="middle" class="node">confirming</text>
  <rect x="430" y="390" width="150" height="68" rx="16" class="state"/><text x="505" y="430" text-anchor="middle" class="node">retrying</text>
  <rect x="900" y="126" width="130" height="62" rx="16" class="final-state"/><text x="965" y="163" text-anchor="middle" class="node">done</text>
  <rect x="900" y="248" width="130" height="62" rx="16" class="final-state"/><text x="965" y="285" text-anchor="middle" class="node">failed</text>
  <circle cx="965" cy="430" r="22" class="final"/><circle cx="965" cy="430" r="13" fill="#1a1a1a"/><text x="965" y="474" text-anchor="middle" class="label">cancelled</text>
  <path d="M 112 210 H 190" class="edge"/><text x="130" y="196" class="label">start</text>
  <path d="M 340 210 H 430" class="edge"/><text x="356" y="196" class="label">context_ready</text>
  <path d="M 580 210 H 670" class="edge"/><text x="590" y="196" class="label">needs_user_confirm</text>
  <path d="M 670 234 H 580" class="edge"/><text x="604" y="260" class="label">approve</text>
  <path d="M 505 244 V 390" class="edge"/><text x="516" y="316" class="label">transient_error</text>
  <path d="M 580 424 H 660 V 244 H 580" class="edge"/><text x="600" y="414" class="label">retry</text>
  <path d="M 580 186 H 900" class="edge"/><text x="704" y="172" class="label">success</text>
  <path d="M 580 222 H 900 V 279" class="edge"/><text x="704" y="236" class="label">fatal_error</text>
  <path d="M 840 210 H 880 V 430 H 943" class="edge"/><text x="848" y="404" class="label">reject / cancel</text>
</svg>
