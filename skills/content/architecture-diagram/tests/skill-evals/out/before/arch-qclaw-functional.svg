  <path d="M 720 840 V 906 H 1130 V 966" class="edge-soft"/>
  <path d="M 1130 840 V 966" class="edge-soft"/>

  <path d="M 310 1012 V 1048 H 720 V 1066" class="edge-soft"/>
  <path d="M 590 1012 V 1048 H 720 V 1066" class="edge-soft"/>
  <path d="M 840 1012 V 1048 H 720 V 1066" class="edge"/>
  <path d="M 1130 1012 V 1048 H 720 V 1066" class="edge-soft"/>
</svg>
