<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 860" width="1240" height="860" role="img" aria-labelledby="t d">
  <title id="t">Mock 调试调用时序图</title>
  <desc id="d">旧版时序基线：参与方齐备，但消息缺少稳定 edge 语义。</desc>
  <defs><marker id="arrow" markerWidth="5" markerHeight="5" refX="4.4" refY="2.5" orient="auto"><polygon points="0 0, 5 2.5, 0 5" fill="#5a5a5a"/></marker></defs>
  <style>
    text { font-family: -apple-system, "PingFang SC", sans-serif; }
    .title { font-size: 28px; font-weight: 700; fill: #1a1a1a; }
    .participant { fill: #9dd4c7; stroke: #4a4a4a; stroke-width: 2; }
    .actor-box { fill: #a8c5e6; stroke: #4a4a4a; stroke-width: 2; }
    .store { fill: #e8e6e3; stroke: #4a4a4a; stroke-width: 2; }
    .lifeline { stroke: #8f8a83; stroke-width: 1.2; stroke-dasharray: 6 5; }
    .edge { fill: none; stroke: #5a5a5a; stroke-width: 1.8; marker-end: url(#arrow); }
    .return { stroke-dasharray: 7 5; }
    .label { font-size: 11px; fill: #5a5a5a; }
    .node { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
  </style>
  <rect width="1240" height="860" fill="#f8f6f3"/><rect x="24" y="24" width="1192" height="812" rx="18" fill="#fffdf8" stroke="#d9d3ca"/>
  <text x="60" y="70" class="title">Mock 调试场景调用时序</text>
  <rect x="72" y="132" width="120" height="44" rx="12" class="actor-box"/><text x="132" y="160" text-anchor="middle" class="node">用户</text>
  <rect x="252" y="132" width="120" height="44" rx="12" class="participant"/><text x="312" y="160" text-anchor="middle" class="node">ChatUI</text>
  <rect x="432" y="132" width="140" height="44" rx="12" class="participant"/><text x="502" y="160" text-anchor="middle" class="node">QClaw Runtime</text>
  <rect x="652" y="132" width="130" height="44" rx="12" class="participant"/><text x="717" y="160" text-anchor="middle" class="node">MockAdapter</text>
  <rect x="862" y="132" width="130" height="44" rx="12" class="participant"/><text x="927" y="160" text-anchor="middle" class="node">ToolService</text>
  <rect x="1052" y="132" width="130" height="44" rx="12" class="store"/><text x="1117" y="160" text-anchor="middle" class="node">Mock 存储</text>
  <line x1="132" y1="176" x2="132" y2="760" class="lifeline"/><line x1="312" y1="176" x2="312" y2="760" class="lifeline"/><line x1="502" y1="176" x2="502" y2="760" class="lifeline"/><line x1="717" y1="176" x2="717" y2="760" class="lifeline"/><line x1="927" y1="176" x2="927" y2="760" class="lifeline"/><line x1="1117" y1="176" x2="1117" y2="760" class="lifeline"/>
  <path d="M 132 230 H 312" class="edge"/><text x="166" y="220" class="label">打开 Mock 模式，切换 X</text>
  <path d="M 312 290 H 502" class="edge"/><text x="350" y="280" class="label">send intent</text>
  <path d="M 502 350 H 717" class="edge"/><text x="535" y="340" class="label">dispatch switch_mock_state</text>
  <path d="M 717 410 H 927" class="edge"/><text x="760" y="400" class="label">read_schema(card_id)</text>
  <path d="M 927 470 H 717" class="edge return"/><text x="790" y="460" class="label">schema</text>
  <path d="M 717 530 H 1117" class="edge"/><text x="790" y="520" class="label">load_mock_state X</text>
  <path d="M 1117 590 H 717" class="edge return"/><text x="820" y="580" class="label">state payload</text>
  <path d="M 717 650 H 502" class="edge"/><text x="536" y="640" class="label">mock.state.applied</text>
  <path d="M 502 710 H 312" class="edge"/><text x="354" y="700" class="label">stream event</text>
  <path d="M 312 748 H 132" class="edge"/><text x="166" y="738" class="label">确认状态切换</text>
</svg>
