<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" width="1000" height="640" role="img" aria-labelledby="diagram-title diagram-desc">
  <title id="diagram-title">[项目名称] 时间线</title>
  <desc id="diagram-desc">sectioned timeline starter：保留单一时间轴、阶段分区、条带和里程碑位置。</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .title { font-size: 28px; font-weight: 700; fill: #1a1a1a; }
    .subtitle { font-size: 14px; fill: #6a6a6a; }
    .axis { stroke: #5a5a5a; stroke-width: 2; }
    .tick { stroke: #8f8a83; stroke-width: 1; }
    .section { fill: rgba(248, 246, 243, 0.7); stroke: #d9d3ca; stroke-width: 1; }
    .bar-a { fill: #9dd4c7; stroke: #4a4a4a; stroke-width: 1.6; }
    .bar-b { fill: #f4e4c1; stroke: #4a4a4a; stroke-width: 1.6; }
    .bar-c { fill: #a8c5e6; stroke: #4a4a4a; stroke-width: 1.6; }
    .node-title { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
    .label { font-size: 10px; fill: #5a5a5a; }
  </style>

  <rect width="1000" height="640" fill="#f8f6f3"/>
  <rect x="24" y="24" width="952" height="592" rx="18" fill="#fffdf8" stroke="#d9d3ca" stroke-width="1.4"/>
  <text x="60" y="64" class="title">[项目名称] 时间线</text>
  <text x="60" y="88" class="subtitle">[在这里填写阶段推进、时间刻度和关键里程碑]</text>

  <rect x="220" y="220" width="300" height="272" rx="16" class="section"/>
  <rect x="540" y="220" width="320" height="272" rx="16" class="section"/>
  <text x="250" y="244" class="node-title">探索期</text>
  <text x="570" y="244" class="node-title">交付期</text>

  <line x1="220" y1="184" x2="860" y2="184" class="axis"/>
  <line x1="220" y1="176" x2="220" y2="192" class="tick"/>
  <line x1="430" y1="176" x2="430" y2="192" class="tick"/>
  <line x1="640" y1="176" x2="640" y2="192" class="tick"/>
  <line x1="860" y1="176" x2="860" y2="192" class="tick"/>
  <text x="220" y="164" class="label" text-anchor="middle">启动</text>
  <text x="430" y="164" class="label" text-anchor="middle">收敛</text>
  <text x="640" y="164" class="label" text-anchor="middle">实现</text>
  <text x="860" y="164" class="label" text-anchor="middle">发布</text>

  <text x="84" y="278" class="node-title">任务流 A</text>
  <text x="84" y="358" class="node-title">任务流 B</text>
  <text x="84" y="438" class="node-title">发布准备</text>

  <rect x="238" y="252" width="170" height="30" rx="10" class="bar-a"/>
  <rect x="450" y="332" width="220" height="30" rx="10" class="bar-b"/>
  <rect x="690" y="412" width="130" height="30" rx="10" class="bar-c"/>
  <text x="323" y="271" class="label" text-anchor="middle">问题发现与方案收敛</text>
  <text x="560" y="351" class="label" text-anchor="middle">实现与联调</text>
  <text x="755" y="431" class="label" text-anchor="middle">验证与发布准备</text>

  <path d="M 860 427 L 874 441 L 860 455 L 846 441 Z" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="1.6"/>
  <text x="860" y="474" class="label" text-anchor="middle">里程碑</text>
</svg>
