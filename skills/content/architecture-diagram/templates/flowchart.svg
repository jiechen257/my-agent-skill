<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 980" width="920" height="980" role="img" aria-labelledby="diagram-title diagram-desc">
  <title id="diagram-title">[流程名称] 流程图</title>
  <desc id="diagram-desc">自上而下 starter：突出主方向、单个决策点和稀疏分支，便于后续扩展真实流程。</desc>
  <defs>
    <marker id="arrow" markerWidth="4.8" markerHeight="4.8" refX="4.2" refY="2.4" orient="auto">
      <polygon points="0 0, 4.8 2.4, 0 4.8" fill="#5a5a5a"/>
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .title { font-size: 28px; font-weight: 700; fill: #1a1a1a; }
    .subtitle { font-size: 14px; fill: #6a6a6a; }
    .terminal { fill: #a8c5e6; stroke: #4a4a4a; stroke-width: 2; }
    .process { fill: #9dd4c7; stroke: #4a4a4a; stroke-width: 2; }
    .io { fill: #f4e4c1; stroke: #4a4a4a; stroke-width: 2; }
    .decision { fill: #e8e6e3; stroke: #4a4a4a; stroke-width: 2; }
    .edge { fill: none; stroke: #5a5a5a; stroke-width: 2; marker-end: url(#arrow); }
    .chip { fill: #fffdf8; stroke: #d9d3ca; stroke-width: 0.8; }
    .label { font-size: 9px; fill: #5a5a5a; }
    .node-title { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
    .node-sub { font-size: 9px; fill: #5a5a5a; }
  </style>

  <rect width="920" height="980" fill="#f8f6f3"/>
  <rect x="24" y="24" width="872" height="932" rx="18" fill="#fffdf8" stroke="#d9d3ca" stroke-width="1.4"/>
  <text x="60" y="64" class="title">[流程名称] 流程图</text>
  <text x="60" y="88" class="subtitle">[在这里填写主路径、决策条件和两个主要分支]</text>

  <rect x="370" y="120" width="180" height="56" rx="18" class="terminal"/>
  <rect x="320" y="240" width="280" height="76" rx="12" class="process"/>
  <path d="M 460 370 L 570 430 L 460 490 L 350 430 Z" class="decision"/>
  <rect x="590" y="520" width="210" height="76" rx="12" class="process"/>
  <rect x="120" y="520" width="210" height="76" rx="12" class="io"/>
  <rect x="360" y="760" width="180" height="56" rx="18" class="terminal"/>

  <text x="460" y="152" class="node-title" text-anchor="middle">开始</text>
  <text x="460" y="283" class="node-title" text-anchor="middle">主处理步骤</text>
  <text x="460" y="302" class="node-sub" text-anchor="middle">[在这里填动作或检查]</text>
  <text x="460" y="435" class="node-title" text-anchor="middle">条件满足？</text>
  <text x="695" y="563" class="node-title" text-anchor="middle">继续执行</text>
  <text x="695" y="582" class="node-sub" text-anchor="middle">[成功 / 放行分支]</text>
  <text x="225" y="563" class="node-title" text-anchor="middle">人工处理</text>
  <text x="225" y="582" class="node-sub" text-anchor="middle">[兜底 / 回退分支]</text>
  <text x="450" y="792" class="node-title" text-anchor="middle">结束</text>

  <path d="M 460 176 V 240" class="edge" id="edge-start-main"/>
  <path d="M 460 316 V 370" class="edge" id="edge-main-decision"/>
  <path d="M 570 430 H 695 V 520" class="edge" id="edge-decision-yes"/>
  <path d="M 350 430 H 225 V 520" class="edge" id="edge-decision-no"/>
  <path d="M 695 596 V 700 H 490 V 760" class="edge" id="edge-yes-end"/>
  <path d="M 225 596 V 700 H 410 V 760" class="edge" id="edge-no-end"/>

  <rect x="606" y="414" width="34" height="16" rx="5" class="chip" data-edge-id="edge-decision-yes"/>
  <text x="623" y="425" class="label" text-anchor="middle" data-edge-id="edge-decision-yes">是</text>
  <rect x="240" y="414" width="34" height="16" rx="5" class="chip" data-edge-id="edge-decision-no"/>
  <text x="257" y="425" class="label" text-anchor="middle" data-edge-id="edge-decision-no">否</text>
</svg>
