<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 760" width="1000" height="760">
  <defs>
    <marker id="arrow" markerWidth="4.8" markerHeight="4.8" refX="4.2" refY="2.4" orient="auto">
      <polygon points="0 0, 4.8 2.4, 0 4.8" fill="#5a5a5a"/>
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .title { font-size: 28px; font-weight: 700; fill: #1a1a1a; }
    .subtitle { font-size: 14px; fill: #6a6a6a; }
    .state { fill: #9dd4c7; stroke: #4a4a4a; stroke-width: 2; }
    .passive { fill: #e8e6e3; stroke: #4a4a4a; stroke-width: 2; }
    .edge { fill: none; stroke: #5a5a5a; stroke-width: 2; marker-end: url(#arrow); }
    .chip { fill: #fffdf8; stroke: #d9d3ca; stroke-width: 0.8; }
    .label { font-size: 9px; fill: #5a5a5a; }
    .node-title { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
    .node-sub { font-size: 9px; fill: #5a5a5a; }
  </style>
  <rect width="1000" height="760" fill="#f8f6f3"/>
  <rect x="24" y="24" width="952" height="712" rx="18" fill="#fffdf8" stroke="#d9d3ca" stroke-width="1.4"/>
  <text x="60" y="58" class="title">[状态主题] 状态机图</text>
  <text x="60" y="80" class="subtitle">[在这里填写状态、迁移事件和守卫条件]</text>
  <circle cx="140" cy="230" r="12" fill="#1a1a1a"/>
  <circle cx="860" cy="540" r="18" fill="#fffdf8" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="860" cy="540" r="10" fill="#1a1a1a"/>
  <path d="M 152 230 H 280" class="edge" id="edge-init-pending"/>
  <path d="M 430 230 H 570" class="edge" id="edge-pending-running"/>
  <path d="M 720 230 H 744 V 540 H 842" class="edge" id="edge-running-done"/>
  <path d="M 350 290 V 430 H 650 V 480" class="edge" id="edge-pending-retry"/>
  <rect x="280" y="190" width="150" height="80" rx="16" class="state"/>
  <text x="355" y="220" class="node-title" text-anchor="middle">待处理</text>
  <text x="355" y="239" class="node-sub" text-anchor="middle">entry / 初始化上下文</text>
  <rect x="570" y="190" width="150" height="80" rx="16" class="state"/>
  <text x="645" y="220" class="node-title" text-anchor="middle">执行中</text>
  <text x="645" y="239" class="node-sub" text-anchor="middle">do / 核心处理</text>
  <rect x="575" y="480" width="150" height="80" rx="16" class="passive"/>
  <text x="650" y="510" class="node-title" text-anchor="middle">失败重试</text>
  <text x="650" y="529" class="node-sub" text-anchor="middle">exit / 记录错误</text>
  <rect x="210" y="224" width="42" height="16" rx="5" class="chip" data-edge-id="edge-init-pending"/>
  <text x="231" y="235" class="label" text-anchor="middle" data-edge-id="edge-init-pending">开始</text>
  <rect x="470" y="224" width="58" height="16" rx="5" class="chip" data-edge-id="edge-pending-running"/>
  <text x="499" y="235" class="label" text-anchor="middle" data-edge-id="edge-pending-running">submit</text>
  <rect x="728" y="360" width="64" height="16" rx="5" class="chip" data-edge-id="edge-running-done"/>
  <text x="760" y="371" class="label" text-anchor="middle" data-edge-id="edge-running-done">done [ok]</text>
  <rect x="426" y="420" width="86" height="16" rx="5" class="chip" data-edge-id="edge-pending-retry"/>
  <text x="469" y="431" class="label" text-anchor="middle" data-edge-id="edge-pending-retry">error [retry]</text>
</svg>
