<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" width="1000" height="620">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .title { font-size: 28px; font-weight: 700; fill: #1a1a1a; }
    .subtitle { font-size: 14px; fill: #6a6a6a; }
    .axis { stroke: #5a5a5a; stroke-width: 2; }
    .tick { stroke: #8f8a83; stroke-width: 1; }
    .bar-a { fill: #9dd4c7; stroke: #4a4a4a; stroke-width: 1.6; }
    .bar-b { fill: #f4e4c1; stroke: #4a4a4a; stroke-width: 1.6; }
    .bar-c { fill: #a8c5e6; stroke: #4a4a4a; stroke-width: 1.6; }
    .node-title { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
    .label { font-size: 10px; fill: #5a5a5a; }
  </style>
  <rect width="1000" height="620" fill="#f8f6f3"/>
  <rect x="24" y="24" width="952" height="572" rx="18" fill="#fffdf8" stroke="#d9d3ca" stroke-width="1.4"/>
  <text x="60" y="58" class="title">[项目名称] 时间线</text>
  <text x="60" y="80" class="subtitle">[在这里填写阶段推进、持续时间和里程碑]</text>
  <line x1="180" y1="180" x2="860" y2="180" class="axis"/>
  <line x1="180" y1="172" x2="180" y2="188" class="tick"/>
  <line x1="350" y1="172" x2="350" y2="188" class="tick"/>
  <line x1="520" y1="172" x2="520" y2="188" class="tick"/>
  <line x1="690" y1="172" x2="690" y2="188" class="tick"/>
  <line x1="860" y1="172" x2="860" y2="188" class="tick"/>
  <text x="180" y="160" class="label" text-anchor="middle">Q1</text>
  <text x="350" y="160" class="label" text-anchor="middle">Q2</text>
  <text x="520" y="160" class="label" text-anchor="middle">Q3</text>
  <text x="690" y="160" class="label" text-anchor="middle">Q4</text>
  <text x="860" y="160" class="label" text-anchor="middle">发布</text>
  <text x="80" y="256" class="node-title">阶段一</text>
  <text x="80" y="346" class="node-title">阶段二</text>
  <text x="80" y="436" class="node-title">阶段三</text>
  <rect x="180" y="230" width="250" height="36" rx="10" class="bar-a"/>
  <rect x="320" y="320" width="280" height="36" rx="10" class="bar-b"/>
  <rect x="580" y="410" width="200" height="36" rx="10" class="bar-c"/>
  <text x="305" y="252" class="label" text-anchor="middle">发现问题与方案收敛</text>
  <text x="460" y="342" class="label" text-anchor="middle">实现与联调</text>
  <text x="680" y="432" class="label" text-anchor="middle">验证与发布准备</text>
  <path d="M 770 290 L 786 306 L 770 322 L 754 306 Z" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="1.6"/>
  <text x="770" y="280" class="label" text-anchor="middle">里程碑</text>
</svg>
