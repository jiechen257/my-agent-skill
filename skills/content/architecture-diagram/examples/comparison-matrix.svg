<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" width="1000" height="540">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .title { font-size: 28px; font-weight: 700; fill: #1a1a1a; }
    .subtitle { font-size: 14px; fill: #6a6a6a; }
    .header { fill: #f4e4c1; stroke: #4a4a4a; stroke-width: 1.6; }
    .rowhead { fill: #e8e6e3; stroke: #4a4a4a; stroke-width: 1.2; }
    .yes { fill: #9dd4c7; stroke: #4a4a4a; stroke-width: 1.2; }
    .partial { fill: #f4e4c1; stroke: #4a4a4a; stroke-width: 1.2; }
    .no { fill: #fffdf8; stroke: #4a4a4a; stroke-width: 1.2; }
    .cell { stroke: #4a4a4a; stroke-width: 1.2; }
    .node-title { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
    .label { font-size: 10px; fill: #5a5a5a; }
  </style>
  <rect width="1000" height="540" fill="#f8f6f3"/>
  <rect x="24" y="24" width="952" height="492" rx="18" fill="#fffdf8" stroke="#d9d3ca" stroke-width="1.4"/>
  <text x="60" y="58" class="title">[对比主题] 对比矩阵</text>
  <text x="60" y="80" class="subtitle">[在这里填写候选方案、评估维度和支持情况]</text>
  <rect x="60" y="150" width="120" height="50" class="header"/>
  <rect x="180" y="150" width="180" height="50" class="header"/>
  <rect x="360" y="150" width="180" height="50" class="header"/>
  <rect x="540" y="150" width="180" height="50" class="header"/>
  <rect x="720" y="150" width="180" height="50" class="header"/>
  <text x="120" y="180" class="node-title" text-anchor="middle">评估维度</text>
  <text x="270" y="180" class="node-title" text-anchor="middle">方案 A</text>
  <text x="450" y="180" class="node-title" text-anchor="middle">方案 B</text>
  <text x="630" y="180" class="node-title" text-anchor="middle">方案 C</text>
  <text x="810" y="180" class="node-title" text-anchor="middle">方案 D</text>
  <rect x="60" y="200" width="120" height="70" class="rowhead"/>
  <rect x="60" y="270" width="120" height="70" class="rowhead"/>
  <rect x="60" y="340" width="120" height="70" class="rowhead"/>
  <text x="120" y="240" class="node-title" text-anchor="middle">复杂度</text>
  <text x="120" y="310" class="node-title" text-anchor="middle">可维护性</text>
  <text x="120" y="380" class="node-title" text-anchor="middle">上线风险</text>
  <rect x="180" y="200" width="180" height="70" class="yes"/>
  <rect x="360" y="200" width="180" height="70" class="partial"/>
  <rect x="540" y="200" width="180" height="70" class="no"/>
  <rect x="720" y="200" width="180" height="70" class="yes"/>
  <rect x="180" y="270" width="180" height="70" class="partial"/>
  <rect x="360" y="270" width="180" height="70" class="yes"/>
  <rect x="540" y="270" width="180" height="70" class="partial"/>
  <rect x="720" y="270" width="180" height="70" class="yes"/>
  <rect x="180" y="340" width="180" height="70" class="no"/>
  <rect x="360" y="340" width="180" height="70" class="partial"/>
  <rect x="540" y="340" width="180" height="70" class="yes"/>
  <rect x="720" y="340" width="180" height="70" class="partial"/>
  <text x="270" y="240" class="label" text-anchor="middle">低</text>
  <text x="450" y="240" class="label" text-anchor="middle">中</text>
  <text x="630" y="240" class="label" text-anchor="middle">高</text>
  <text x="810" y="240" class="label" text-anchor="middle">低</text>
  <text x="270" y="310" class="label" text-anchor="middle">中</text>
  <text x="450" y="310" class="label" text-anchor="middle">高</text>
  <text x="630" y="310" class="label" text-anchor="middle">中</text>
  <text x="810" y="310" class="label" text-anchor="middle">高</text>
  <text x="270" y="380" class="label" text-anchor="middle">高</text>
  <text x="450" y="380" class="label" text-anchor="middle">中</text>
  <text x="630" y="380" class="label" text-anchor="middle">低</text>
  <text x="810" y="380" class="label" text-anchor="middle">中</text>
</svg>
