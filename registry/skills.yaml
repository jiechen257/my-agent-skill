# Skill registry for repo-managed and vendored skills.
# Paths are relative to the repository root.
#
# kind:
# - repo-managed: maintained directly in this repository
# - vendored: copied/synced from an external source
#
# source_type:
# - local: no external sync source
# - git: clone source_url and copy source_subdir
skills:
  # === design ===
  - name: colawd-ui-style
    path: skills/design/colawd-ui-style
    kind: repo-managed
    codex: true
    claude: true
    source_type: local

