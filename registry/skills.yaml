# Skill registry for repo-managed and vendored skills.
# Paths are relative to the repository root unless they are source paths.
#
# kind:
# - repo-managed: maintained directly in this repository
# - vendored: copied from an external source, then exposed through this repository
#
# source_type:
# - local: no external sync source
# - local-copy: copy from source_path
# - git: clone source_url and copy source_subdir
